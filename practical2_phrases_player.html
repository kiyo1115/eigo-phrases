
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実用フレーズ2 聞き流しプレイヤー</title>
<style>
  :root {
    --bg: #14110f;
    --panel: #1c1815;
    --amber: #ff8c2e;
    --amber-dim: #c4691a;
    --text: #ede5d8;
    --text-dim: #968d7f;
    --line: #2e2822;
    --red: #d4453a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
    padding: 32px 16px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }


  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--line);
    border-radius: 99px;
    padding: 6px 14px;
    margin-bottom: 16px;
    transition: 0.15s;
  }
  .back-link:hover { border-color: var(--amber-dim); color: var(--amber); }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--amber-dim);
    text-transform: uppercase;
    font-weight: 700;
  }
  h1 {
    font-size: 26px;
    margin: 4px 0 24px;
    letter-spacing: -0.01em;
  }
  h1 span { color: var(--amber); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .now-playing {
    text-align: center;
    padding: 28px 16px;
  }
  .cat-tag {
    display: inline-block;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    border-radius: 99px;
    padding: 3px 10px;
    margin-bottom: 16px;
  }
  .phrase-en {
    font-size: 34px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 10px;
    min-height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phrase-jp {
    font-size: 18px;
    color: var(--text-dim);
  }

  .progress {
    height: 3px;
    background: var(--line);
    border-radius: 99px;
    overflow: hidden;
    margin: 20px 0 4px;
  }
  .progress-bar {
    height: 100%;
    background: var(--amber);
    width: 0%;
    transition: width 0.2s linear;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-top: 20px;
  }
  .btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 99px;
    cursor: pointer;
    transition: 0.15s;
  }
  .btn:hover { border-color: var(--amber-dim); }
  .btn-skip { width: 44px; height: 44px; font-size: 16px; }
  .btn-play {
    width: 64px; height: 64px;
    font-size: 22px;
    background: var(--amber);
    border: none;
    color: #1a1208;
  }
  .btn-play:hover { background: #ffa14f; }

  .settings-row {
    display: flex;
    gap: 12px;
    margin-top: 18px;
  }
  .settings-row > div { flex: 1; }
  label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  select, input[type=range] {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px;
    font-size: 13px;
  }

  .cat-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .cat-chip {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 99px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .cat-chip.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(255,140,46,0.08);
  }

  .list-title {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  .phrase-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
  }
  .phrase-row:hover { background: var(--bg); }
  .phrase-row.current { background: rgba(255,140,46,0.1); }
  .phrase-row .en { font-weight: 600; }
  .phrase-row .jp { color: var(--text-dim); font-size: 14px; }
  .phrase-row .idx {
    color: var(--amber-dim);
    font-size: 11px;
    width: 24px;
    flex-shrink: 0;
  }
  .row-main { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .row-main .en, .row-main .jp { white-space: normal; }
  .row-main .idx { align-self: flex-start; }

  .status-buttons {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .status-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: 0.15s;
  }
  .status-btn:hover { border-color: var(--amber-dim); }
  .status-btn.active-learning {
    background: rgba(196,105,26,0.25);
    border-color: var(--amber-dim);
    color: var(--amber);
  }
  .status-btn.active-known {
    background: rgba(255,140,46,0.3);
    border-color: var(--amber);
    color: var(--amber);
  }
  .status-btn.active-speakable {
    background: var(--amber);
    border-color: var(--amber);
    color: #1a1208;
  }

  .now-playing .status-buttons {
    justify-content: center;
    margin: 14px 0 0;
  }
  .now-playing .status-btn {
    width: 36px;
    height: 36px;
    font-size: 13px;
  }
  .status-label {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 4px;
  }

  .stats-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 11px;
  }
  .stat-pill {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--line);
  }
  .stat-pill .num { font-size: 16px; font-weight: 700; color: var(--amber); display: block; }
  .stat-pill .label { color: var(--text-dim); }

  .status-filter-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .status-chip {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 99px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
  }
  .status-chip.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(255,140,46,0.08);
  }

  .hint {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-top: 4px;
  }

  .login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .login-box h2 { font-size: 18px; margin: 0 0 6px; }
  .login-box p { font-size: 12px; color: var(--text-dim); margin: 0 0 20px; }
  .login-box input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    margin-bottom: 12px;
    text-align: center;
  }
  .login-box button {
    width: 100%;
    background: var(--amber);
    border: none;
    color: #1a1208;
    font-weight: 700;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
  }
  .login-status {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    min-height: 14px;
  }
  .sync-badge {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 99px;
    padding: 4px 10px;
    z-index: 10;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>合言葉を入力</h2>
    <p>PCとiPhoneで同じ合言葉を使うとデータが共有されます</p>
    <input type="text" id="passInput" placeholder="例: kouji2026" autocomplete="off">
    <button id="loginBtn">開始する</button>
    <div class="login-status" id="loginStatus"></div>
  </div>
</div>

<div class="sync-badge" id="syncBadge" style="display:none;"></div>

<div class="wrap">
  <a class="back-link" href="index.html">← トップに戻る</a>
  <div class="eyebrow">実用フレーズ2 / 実況強化版</div>
  <h1>実用<span>フレーズ2</span></h1>

  <div class="panel" style="padding:14px 20px;">
    <div class="status-filter-row" id="modeFilters" style="margin-top:0;"></div>
  </div>

  <div class="panel now-playing">
    <div id="emptyMsg" style="display:none; font-size:13px; color:var(--text-dim); line-height:1.7; padding:8px 4px 16px;"></div>
    <div class="cat-tag" id="catTag">状況描写</div>
    <div class="phrase-jp" id="phraseJpQuiz" style="display:none; font-size:26px; font-weight:700; color:var(--text); margin-bottom:18px;"></div>
    <div class="phrase-en" id="phraseEn">Loading...</div>
    <div class="phrase-jp" id="phraseJp"></div>
    <div id="kwBox" style="display:none; margin-top:14px; background:rgba(255,140,46,0.08); border:1px solid var(--amber-dim); border-radius:8px; padding:12px 14px; text-align:left;">
      <div id="kwWord" style="font-size:15px; font-weight:700; color:var(--amber); margin-bottom:4px;"></div>
      <div id="kwEx" style="font-size:13px; color:var(--text-dim); line-height:1.6;"></div>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label"><span id="curIdx">0</span><span id="totalIdx">0</span></div>

    <div class="controls">
      <button class="btn btn-skip" id="prevBtn">⏮</button>
      <button class="btn btn-play" id="playBtn">▶</button>
      <button class="btn btn-skip" id="nextBtn">⏭</button>
    </div>

    <div class="settings-row">
      <div>
        <label>速度</label>
        <select id="rateSelect">
          <option value="0.8" selected>遅め (0.8x)</option>
          <option value="1">標準 (1.0x)</option>
          <option value="1.2">やや速い (1.2x)</option>
        </select>
      </div>
      <div>
        <label>リピート回数</label>
        <select id="repeatSelect">
          <option value="1">1回</option>
          <option value="2">2回</option>
          <option value="3">3回</option>
          <option value="4">4回</option>
          <option value="5" selected>5回</option>
          <option value="6">6回</option>
          <option value="7">7回</option>
          <option value="8">8回</option>
          <option value="9">9回</option>
          <option value="10">10回</option>
        </select>
      </div>
      <div id="jpToggleWrap">
        <label>日本語も読む</label>
        <select id="jpToggle">
          <option value="no">英語のみ</option>
          <option value="yes" selected>英→日</option>
        </select>
      </div>
      <div id="thinkTimeWrap" style="display:none;">
        <label>考える時間</label>
        <select id="thinkTimeSelect">
          <option value="3000">3秒</option>
          <option value="5000">5秒</option>
          <option value="8000" selected>8秒</option>
          <option value="15000">15秒</option>
          <option value="20000">20秒</option>
        </select>
      </div>
      <div id="reviewTimeWrap" style="display:none;">
        <label>答え確認時間</label>
        <select id="reviewTimeSelect">
          <option value="3000">3秒</option>
          <option value="5000">5秒</option>
          <option value="8000" selected>8秒</option>
          <option value="10000">10秒</option>
          <option value="15000">15秒</option>
          <option value="20000">20秒</option>
        </select>
      </div>
    </div>

    <div class="hint" id="voiceHint"></div>

    <div class="status-buttons" id="nowPlayingStatus"></div>
    <div class="status-label">タップして習熟度を記録(端末に保存されます)</div>
  </div>

  <div class="panel">
    <div class="stats-row" id="statsRow"></div>
    <div class="status-filter-row" id="statusFilters"></div>
    <div class="status-filter-row" id="excludeSpeakableRow" style="margin-top:8px;"></div>
  </div>

  <div class="panel">
    <div class="cat-filters" id="catFilters"></div>
  </div>

  <div class="panel">
    <div class="list-title">フレーズ一覧（タップで再生）</div>
    <div id="listContainer"></div>
  </div>
</div>

<script>
const DATA = [
  {cat:"状況描写", en:"I'm stuck", jp:"自分は引っかかって進めない(物理的に動けない)", kw:"stuck", ex:"stuck=動けない・詰まった状態"},

  {cat:"状況描写", en:"This place is empty", jp:"ここは誰もいない", kw:"empty", ex:"empty=空っぽの・誰もいない"},
  {cat:"状況描写", en:"It's too quiet", jp:"静かすぎる(不穏な静けさ)", kw:"too quiet", ex:"too quiet=静かすぎる(不気味さを含む)"},
  {cat:"状況描写", en:"Something's coming", jp:"何かが近づいてくる", kw:"coming", ex:"come=来る、somethingが主語"},
  {cat:"戦闘・アクション", en:"I'm pinned down", jp:"自分は撃たれて動けない(銃撃で釘付け)", kw:"pinned down", ex:"pin down=押さえつける・釘付けにする"},
  {cat:"戦闘・アクション", en:"I'm flanking", jp:"自分は側面から回り込んでる", kw:"flanking", ex:"flank=側面、flanking=側面攻撃をしている"},

  {cat:"戦闘・アクション", en:"He's onto me", jp:"あいつは自分に気づいてる", kw:"onto me", ex:"be onto=〜に気づいている・察知している"},

  {cat:"戦闘・アクション", en:"I barely made it", jp:"自分はかろうじて間に合った(時間・到達)", kw:"barely", ex:"barely=かろうじて・ギリギリで"},

  {cat:"驚き・ショック", en:"I jumped out of my seat", jp:"自分は思わず椅子から飛び上がった", kw:"jumped out", ex:"jump out of one's seat=驚いて飛び上がる"},
  {cat:"驚き・ショック", en:"That gave me chills", jp:"それは鳥肌が立った", kw:"gave me chills", ex:"give chills=鳥肌を立たせる"},
  {cat:"能力・状態", en:"I'm out of my depth", jp:"自分の実力の範囲を超えてる(能力不足)", kw:"out of my depth", ex:"out of one's depth=自分の能力を超えている"},

const MODE_SOURCE = { quiz5: 'quiz', quiz3: 'quiz5' };

function isQuizMode() { return appMode !== 'listen'; }

function isCleared(status) { return status === 'known' || status === 'speakable'; }

// そのフレーズが現在のモードの対象かどうか
function isUnlocked(item) {
  const src = MODE_SOURCE[appMode];
  if (!src) return true; // listen / quiz は全フレーズ対象
  return isCleared(statusMap[src][item.en]);
}

function unlockedCount(mode) {
  const src = MODE_SOURCE[mode];
  if (!src) return DATA.length;
  return DATA.filter(d => isCleared(statusMap[src][d.en])).length;
}

function getThinkMs() {
  if (MODE_THINK_MS[appMode]) return MODE_THINK_MS[appMode];
  return parseInt(document.getElementById('thinkTimeSelect').value);
}

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyU-Nz-INLqD-OaBoETh9hDVWxILeNL4JsnMCeEQZrUpkl3eFc3D6vTBi2VtQcCG_BC/exec';
const APP_KEY = 'practical2'; // distinguishes this app's data from the gta player
const LOCAL_USER_KEY = 'phraseAppUser_v1';

let currentUser = null;
let statusMap = { listen: {}, quiz: {}, quiz5: {}, quiz3: {} };
let saveTimer = null;

function loadStatusMap() {
  return statusMap;
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setSyncBadge('保存中...');
  saveTimer = setTimeout(saveStatusMap, 600);
}

function saveStatusMap(retry) {
  if (!currentUser) return;
  // POSTで送る(GETだとデータ量が増えたときURL長の上限を超えて保存が失敗するため)
  fetch(GAS_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({
      action: 'save',
      user: APP_KEY + ':' + currentUser,
      data: JSON.stringify(statusMap)
    })
  })
    .then(r => r.json())
    .then(res => {
      if (res && res.error) throw new Error(res.error);
      setSyncBadge('保存済み');
    })
    .catch(() => {
      if (!retry) {
        setSyncBadge('保存リトライ中...');
        setTimeout(() => saveStatusMap(true), 1500);
      } else {
        setSyncBadge('⚠保存失敗 タップで再試行');
      }
    });
}

function loadFromServer(user) {
  const url = GAS_URL + '?action=load&user=' + encodeURIComponent(APP_KEY + ':' + user);
  return fetch(url)
    .then(r => r.json())
    .then(res => {
      try {
        const parsed = JSON.parse(res.data || '{}');
        // 旧フォーマット(モード分け前)は listen バケットへ移行
        if (parsed && (parsed.listen || parsed.quiz)) {
          statusMap = {
            listen: parsed.listen || {},
            quiz: parsed.quiz || {},
            quiz5: parsed.quiz5 || {},
            quiz3: parsed.quiz3 || {}
          };
        } else {
          statusMap = { listen: parsed || {}, quiz: {}, quiz5: {}, quiz3: {} };
        }
      } catch (e) {
        statusMap = { listen: {}, quiz: {}, quiz5: {}, quiz3: {} };
      }
    });
}

];

function currentBucket() {
  return statusMap[appMode];
}

function getStatus(item) {
  return currentBucket()[item.en] || 'none';
}

function setStatus(item, status) {
  const bucket = currentBucket();
  if (bucket[item.en] === status) {
    delete bucket[item.en];
  } else {
    bucket[item.en] = status;
  }
  scheduleSave();
  renderList();
  renderNowPlayingStatus();
  renderStats();
  buildModeFilters();
}

function buildStatusButtonsEl(item, large) {
  const wrap = document.createElement('div');
  wrap.className = 'status-buttons';
  STATUS_DEFS.forEach(def => {
    const btn = document.createElement('button');
    btn.className = 'status-btn';
    btn.textContent = def.icon;
    btn.title = def.label;
    if (getStatus(item) === def.key) btn.classList.add('active-' + def.key);
    btn.onclick = (e) => {
      e.stopPropagation();
      setStatus(item, def.key);
    };
    wrap.appendChild(btn);
  });
  return wrap;
}

function buildStatusFilters() {
  const container = document.getElementById('statusFilters');

    { key: 'all', label: 'すべて' },

    { key: 'learning', label: '!未習得' },
    { key: 'none', label: '未チェック' },

  allDefs.forEach(def => {
    const chip = document.createElement('div');
    chip.className = 'status-chip' + (activeStatusFilter === def.key ? ' active' : '');
    chip.textContent = def.label;
    chip.onclick = () => {

function buildFilters() {
  const cats = [...new Set(DATA.map(d => d.cat))];
  catFilters.innerHTML = '';
  cats.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip active';
    chip.textContent = cat;
    chip.onclick = () => {
      if (activeCats.has(cat)) {
        if (activeCats.size === 1) return;
        activeCats.delete(cat);
        chip.classList.remove('active');
      } else {
        activeCats.add(cat);
        chip.classList.add('active');
      }
      applyFilter();
    };
    catFilters.appendChild(chip);
  });
}

function applyFilter() {
  filtered = DATA.filter(d => {
    if (!isUnlocked(d)) return false;
    if (!activeCats.has(d.cat)) return false;
    if (activeStatusFilter !== 'all' && getStatus(d) !== activeStatusFilter) return false;
    if (excludeSpeakable && getStatus(d) === 'speakable') return false;
    if (excludeKnown && getStatus(d) === 'known') return false;
    return true;
  });
  curIndex = 0;
  renderList();
  updateDisplay();
}

    }
  }

  document.querySelectorAll('.phrase-row').forEach((r, i) => {
    r.classList.toggle('current', i === curIndex);
  });
  renderNowPlayingStatus();
}

function revealAnswer() {
  if (filtered.length === 0) return;
  const item = filtered[curIndex];
  phraseEn.textContent = item.en;
  phraseEn.style.opacity = '1';
  // show keyword box
  if (item.kw) {
    document.getElementById('kwWord').textContent = item.kw;
    document.getElementById('kwEx').textContent = item.ex || '';
    document.getElementById('kwBox').style.display = 'block';
  }
}

function speakCurrent() {
  if (filtered.length === 0) return;
  const item = filtered[curIndex];
  const rate = parseFloat(rateSelect.value);
  const wantJp = jpToggle.value === 'yes';

  if (isQuizMode()) {
    // 日本語音声 → 考える時間 → 英語表示+音声
    const thinkMs = getThinkMs();
    clearTimeout(quizTimer);

    if (japaneseVoice) {
      const uttJpFirst = new SpeechSynthesisUtterance(item.jp);
      uttJpFirst.lang = 'ja-JP';
      uttJpFirst.voice = japaneseVoice;
      uttJpFirst.rate = 1;
      uttJpFirst.onend = () => {
        quizTimer = setTimeout(() => {
          if (!isPlaying) return;
          revealAnswer();
          speakEnglishThenAdvance(item, rate);
        }, thinkMs);
      };

      synth.cancel();
      synth.speak(uttJpFirst);
    } else {
      quizTimer = setTimeout(() => {
        if (!isPlaying) return;
        revealAnswer();
        speakEnglishThenAdvance(item, rate);
      }, thinkMs);
    }
    return;
  }

  speakEnglishThenAdvance(item, rate, wantJp);
}

function speakEnglishThenAdvance(item, rate, wantJp) {
  const uttEn = new SpeechSynthesisUtterance(item.en);
  uttEn.lang = 'en-US';
  uttEn.rate = rate;
  if (englishVoice) uttEn.voice = englishVoice;

  uttEn.onend = () => {
    repeatCount++;
    if (repeatCount < repeatTotal) {
      if (isPlaying) speakEnglishThenAdvance(item, rate, wantJp);
      return;
    }
    repeatCount = 0;
    const reviewMs = isQuizMode() ? parseInt(document.getElementById('reviewTimeSelect').value) : 0;
    const proceed = () => {
      if (!isPlaying) return;
      if (wantJp && japaneseVoice) {
        const uttJp = new SpeechSynthesisUtterance(item.jp);
        uttJp.lang = 'ja-JP';
        uttJp.voice = japaneseVoice;
        uttJp.rate = 1;
        uttJp.onend = () => { if (isPlaying) goNext(true); };
        synth.speak(uttJp);
      } else {
        goNext(true);
      }
    };
    if (reviewMs > 0) {
      clearTimeout(quizTimer);
      quizTimer = setTimeout(proceed, reviewMs);
    } else {
      proceed();
    }
  };

  synth.cancel();
  synth.speak(uttEn);
}

function goNext(auto) {
  curIndex = (curIndex + 1) % filtered.length;
  updateDisplay();
  if (isPlaying) speakCurrent();
}

function goPrev() {
  stopSpeaking();
  curIndex = (curIndex - 1 + filtered.length) % filtered.length;
  updateDisplay();
  if (isPlaying) speakCurrent();
}

function stopSpeaking() {
  synth.cancel();
  clearTimeout(quizTimer);
  repeatCount = 0;
}

function buildModeFilters() {
  const container = document.getElementById('modeFilters');
  container.innerHTML = '';
  const modes = [
    { key: 'listen', label: '聞き流し' },
    { key: 'quiz', label: 'クイズ(時間可変)' },
    { key: 'quiz5', label: '5秒モード' },
    { key: 'quiz3', label: '3秒モード' },
  ];
  modes.forEach(m => {
    const chip = document.createElement('div');
    chip.className = 'status-chip' + (appMode === m.key ? ' active' : '');
    const n = unlockedCount(m.key);
    chip.textContent = MODE_SOURCE[m.key] ? `${m.label} (${n})` : m.label;
    if (MODE_SOURCE[m.key] && n === 0) chip.style.opacity = '0.4';
    chip.onclick = () => {
      stopSpeaking();
      isPlaying = false;
      playBtn.textContent = '▶';
      appMode = m.key;
      document.getElementById('jpToggleWrap').style.display = (appMode === 'listen') ? 'block' : 'none';
      document.getElementById('thinkTimeWrap').style.display = (appMode === 'quiz') ? 'block' : 'none';
      document.getElementById('reviewTimeWrap').style.display = isQuizMode() ? 'block' : 'none';
      buildModeFilters();
      applyFilter();
      renderStats();
      updateDisplay();
    };
    container.appendChild(chip);
  });
}

playBtn.onclick = () => {
  isPlaying = !isPlaying;
  playBtn.textContent = isPlaying ? '⏸' : '▶';
  if (isPlaying) {
    repeatCount = 0;
    if (isQuizMode()) updateDisplay(); // 答えを隠した状態に戻す
    speakCurrent();
  } else {
    stopSpeaking();
  }
};

nextBtn.onclick = () => { stopSpeaking(); goNext(); };
prevBtn.onclick = goPrev;

repeatSelect.onchange = () => { repeatTotal = parseInt(repeatSelect.value); };

function initApp() {
  buildFilters();
  buildStatusFilters();
  buildModeFilters();
  buildExcludeSpeakableToggle();
  renderStats();
  renderList();
  updateDisplay();
}

function startSession(user) {
  currentUser = user;
  localStorage.setItem(LOCAL_USER_KEY, user);
  document.getElementById('loginStatus').textContent = '読み込み中...';
  loadFromServer(user).then(() => {
    document.getElementById('loginOverlay').style.display = 'none';
    setSyncBadge(user + ' で同期中');
    initApp();
  }).catch(() => {
    document.getElementById('loginStatus').textContent = '通信に失敗しました。もう一度お試しください。';
  });
}

document.getElementById('loginBtn').onclick = () => {
  const val = document.getElementById('passInput').value.trim();
  if (!val) {
    document.getElementById('loginStatus').textContent = '合言葉を入力してください';
    return;
  }
  startSession(val);
};
document.getElementById('passInput').onkeydown = (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
};

document.getElementById('syncBadge').onclick = () => {
  if (document.getElementById('syncBadge').textContent.indexOf('失敗') !== -1) {
    saveStatusMap();
    return;
  }
  if (currentUser) loadFromServer(currentUser).then(() => {
    setSyncBadge(currentUser + ' で同期中(更新済み)');
    initApp();
  });
};

// auto-login if a saved username exists on this device
const savedUser = localStorage.getItem(LOCAL_USER_KEY);
if (savedUser) {
  document.getElementById('passInput').value = savedUser;
  startSession(savedUser);
}
</script>
