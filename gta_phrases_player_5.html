
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTA実況フレーズ 聞き流しプレイヤー</title>
<style>
  :root {
    --bg: #14110f;
    --panel: #1c1815;
    --amber: #ff8c2e;
    --amber-dim: #c4691a;
    --text: #ede5d8;
    --text-dim: #968d7f;
    --line: #2e2822;
    --red: #d4453a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
    padding: 32px 16px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }


  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--line);
    border-radius: 99px;
    padding: 6px 14px;
    margin-bottom: 16px;
    transition: 0.15s;
  }
  .back-link:hover { border-color: var(--amber-dim); color: var(--amber); }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--amber-dim);
    text-transform: uppercase;
    font-weight: 700;
  }
  h1 {
    font-size: 26px;
    margin: 4px 0 24px;
    letter-spacing: -0.01em;
  }
  h1 span { color: var(--amber); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .now-playing {
    text-align: center;
    padding: 28px 16px;
  }
  .cat-tag {
    display: inline-block;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    border-radius: 99px;
    padding: 3px 10px;
    margin-bottom: 16px;
  }
  .phrase-en {
    font-size: 34px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 10px;
    min-height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phrase-jp {
    font-size: 18px;
    color: var(--text-dim);
  }

  .progress {
    height: 3px;
    background: var(--line);
    border-radius: 99px;
    overflow: hidden;
    margin: 20px 0 4px;
  }
  .progress-bar {
    height: 100%;
    background: var(--amber);
    width: 0%;
    transition: width 0.2s linear;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-top: 20px;
  }
  .btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 99px;
    cursor: pointer;
    transition: 0.15s;
  }
  .btn:hover { border-color: var(--amber-dim); }
  .btn-skip { width: 44px; height: 44px; font-size: 16px; }
  .btn-play {
    width: 64px; height: 64px;
    font-size: 22px;
    background: var(--amber);
    border: none;
    color: #1a1208;
  }
  .btn-play:hover { background: #ffa14f; }

  .settings-row {
    display: flex;
    gap: 12px;
    margin-top: 18px;
  }
  .settings-row > div { flex: 1; }
  label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  select, input[type=range] {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px;
    font-size: 13px;
  }

  .cat-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .cat-chip {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 99px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .cat-chip.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(255,140,46,0.08);
  }

  .list-title {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  .phrase-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
  }
  .phrase-row:hover { background: var(--bg); }
  .phrase-row.current { background: rgba(255,140,46,0.1); }
  .phrase-row .en { font-weight: 600; }
  .phrase-row .jp { color: var(--text-dim); font-size: 14px; }
  .phrase-row .idx {
    color: var(--amber-dim);
    font-size: 11px;
    width: 24px;
    flex-shrink: 0;
  }
  .row-main { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .row-main .en, .row-main .jp { white-space: normal; }
  .row-main .idx { align-self: flex-start; }

  .status-buttons {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .status-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: 0.15s;
  }
  .status-btn:hover { border-color: var(--amber-dim); }
  .status-btn.active-learning {
    background: rgba(196,105,26,0.25);
    border-color: var(--amber-dim);
    color: var(--amber);
  }
  .status-btn.active-known {
    background: rgba(255,140,46,0.3);
    border-color: var(--amber);
    color: var(--amber);
  }
  .status-btn.active-speakable {
    background: var(--amber);
    border-color: var(--amber);
    color: #1a1208;
  }

  .now-playing .status-buttons {
    justify-content: center;
    margin: 14px 0 0;
  }
  .now-playing .status-btn {
    width: 36px;
    height: 36px;
    font-size: 13px;
  }
  .status-label {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 4px;
  }

  .stats-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 11px;
  }
  .stat-pill {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--line);
  }
  .stat-pill .num { font-size: 16px; font-weight: 700; color: var(--amber); display: block; }
  .stat-pill .label { color: var(--text-dim); }

  .status-filter-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .status-chip {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 99px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
  }
  .status-chip.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(255,140,46,0.08);
  }

  .hint {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-top: 4px;
  }

  .login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .login-box h2 { font-size: 18px; margin: 0 0 6px; }
  .login-box p { font-size: 12px; color: var(--text-dim); margin: 0 0 20px; }
  .login-box input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    margin-bottom: 12px;
    text-align: center;
  }
  .login-box button {
    width: 100%;
    background: var(--amber);
    border: none;
    color: #1a1208;
    font-weight: 700;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
  }
  .login-status {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    min-height: 14px;
  }
  .sync-badge {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 99px;
    padding: 4px 10px;
    z-index: 10;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>合言葉を入力</h2>
    <p>PCとiPhoneで同じ合言葉を使うとデータが共有されます</p>
    <input type="text" id="passInput" placeholder="例: kouji2026" autocomplete="off">
    <button id="loginBtn">開始する</button>
    <div class="login-status" id="loginStatus"></div>
  </div>
</div>

<div class="sync-badge" id="syncBadge" style="display:none;"></div>

<div class="wrap">
  <a class="back-link" href="index.html">← トップに戻る</a>
  <div class="eyebrow">GTA英語実況 / 聞き流し</div>
  <h1>フレーズ<span>プレイヤー</span></h1>

  <div class="panel" style="padding:14px 20px;">
    <div class="status-filter-row" id="modeFilters" style="margin-top:0;"></div>
  </div>

  <div class="panel now-playing">
    <div class="cat-tag" id="catTag">状況描写</div>
    <div class="phrase-jp" id="phraseJpQuiz" style="display:none; font-size:26px; font-weight:700; color:var(--text); margin-bottom:18px;"></div>
    <div class="phrase-en" id="phraseEn">Loading...</div>
    <div class="phrase-jp" id="phraseJp"></div>
    <div id="kwBox" style="display:none; margin-top:14px; background:rgba(255,140,46,0.08); border:1px solid var(--amber-dim); border-radius:8px; padding:12px 14px; text-align:left;">
      <div id="kwWord" style="font-size:15px; font-weight:700; color:var(--amber); margin-bottom:4px;"></div>
      <div id="kwEx" style="font-size:13px; color:var(--text-dim); line-height:1.6;"></div>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label"><span id="curIdx">0</span><span id="totalIdx">0</span></div>

    <div class="controls">
      <button class="btn btn-skip" id="prevBtn">⏮</button>
      <button class="btn btn-play" id="playBtn">▶</button>
      <button class="btn btn-skip" id="nextBtn">⏭</button>
    </div>

    <div class="settings-row">
      <div>
        <label>速度</label>
        <select id="rateSelect">
          <option value="0.8" selected>遅め (0.8x)</option>
          <option value="1">標準 (1.0x)</option>
          <option value="1.2">やや速い (1.2x)</option>
        </select>
      </div>
      <div>
        <label>リピート回数</label>
        <select id="repeatSelect">
          <option value="1">1回</option>
          <option value="2">2回</option>
          <option value="3">3回</option>
          <option value="4">4回</option>
          <option value="5" selected>5回</option>
          <option value="6">6回</option>
          <option value="7">7回</option>
          <option value="8">8回</option>
          <option value="9">9回</option>
          <option value="10">10回</option>
        </select>
      </div>
      <div id="jpToggleWrap">
        <label>日本語も読む</label>
        <select id="jpToggle">
          <option value="no">英語のみ</option>
          <option value="yes" selected>英→日</option>
        </select>
      </div>
      <div id="thinkTimeWrap" style="display:none;">
        <label>考える時間</label>
        <select id="thinkTimeSelect">
          <option value="3000">3秒</option>
          <option value="5000" selected>5秒</option>
          <option value="8000">8秒</option>
          <option value="15000">15秒</option>
          <option value="20000">20秒</option>
        </select>
      </div>
      <div id="reviewTimeWrap" style="display:none;">
        <label>答え確認時間</label>
        <select id="reviewTimeSelect">
          <option value="3000">3秒</option>
          <option value="5000">5秒</option>
          <option value="8000" selected>8秒</option>
          <option value="10000">10秒</option>
          <option value="15000">15秒</option>
          <option value="20000">20秒</option>
        </select>
      </div>
    </div>
    <div class="hint" id="voiceHint"></div>

    <div class="status-buttons" id="nowPlayingStatus"></div>
    <div class="status-label">タップして習熟度を記録(端末に保存されます)</div>
  </div>

  <div class="panel">
    <div class="stats-row" id="statsRow"></div>
    <div class="status-filter-row" id="statusFilters"></div>
    <div class="status-filter-row" id="excludeSpeakableRow" style="margin-top:8px;"></div>
  </div>

  <div class="panel">
    <div class="cat-filters" id="catFilters"></div>
  </div>

  <div class="panel">
    <div class="list-title">フレーズ一覧（タップで再生）</div>
    <div id="listContainer"></div>
  </div>
</div>

<script>
const DATA = [
  {cat:"状況描写", en:"I'm being chased", jp:"追われている", kw:"being chased", ex:"be chased=追われる(受動態の進行形)"},
  {cat:"状況描写", en:"Steal a car", jp:"車を盗む", kw:"steal", ex:"steal=盗む(steal-stole-stolen)"},
  {cat:"状況描写", en:"The cops are after me", jp:"警察に追われてる", kw:"after me", ex:"be after=〜を追いかけている"},
  {cat:"状況描写", en:"I got shot", jp:"撃たれた", kw:"got shot", ex:"get shot=撃たれる(受動態のget版・口語的)"},
  {cat:"状況描写", en:"I'm dead", jp:"死んだ", kw:"I'm dead", ex:"dead=死んでいる(状態)、I died=死んだ(動作)との違いに注意"},
  {cat:"状況描写", en:"Take cover", jp:"隠れる", kw:"take cover", ex:"take cover=物陰に隠れる・身を隠す"},
  {cat:"状況描写", en:"I crashed", jp:"クラッシュした", kw:"crashed", ex:"crash=激突する・クラッシュする(crashの過去形)"},
  {cat:"状況描写", en:"I failed the mission", jp:"ミッション失敗", kw:"failed", ex:"fail=失敗する(failの過去形がfailed)"},
  {cat:"状況描写", en:"Let's try again", jp:"やり直す", kw:"try again", ex:"try again=もう一度試す・やり直す"},
  {cat:"銃撃戦", en:"Reload", jp:"リロードする", kw:"reload", ex:"reload=再び装填する(re=再び+load=装填)"},
  {cat:"銃撃戦", en:"I'm out of ammo", jp:"弾切れだ", kw:"out of ammo", ex:"out of=〜がなくなった、ammo=弾薬(ammunitionの略)"},
  {cat:"銃撃戦", en:"I took him down", jp:"仕留めた", kw:"took down", ex:"take down=倒す・仕留める(takeの過去形がtook)"},
  {cat:"銃撃戦", en:"Headshot", jp:"ヘッドショット", kw:"headshot", ex:"head=頭+shot=撃つこと、頭部への命中"},
  {cat:"銃撃戦", en:"Shoot back", jp:"撃ち返せ", kw:"shoot back", ex:"shoot back=反撃する・撃ち返す"},
  {cat:"銃撃戦", en:"Cover me", jp:"援護して", kw:"cover", ex:"cover=カバーする・援護する"},
  {cat:"銃撃戦", en:"I'm surrounded", jp:"囲まれてる", kw:"surrounded", ex:"surround=取り囲む、be surrounded=囲まれている"},
  {cat:"銃撃戦", en:"I keep missing", jp:"弾が当たらない", kw:"keep missing", ex:"keep+ing=〜し続ける、miss=外す・当たらない"},
  {cat:"運転", en:"Drift", jp:"ドリフトする", kw:"drift", ex:"drift=横滑りする・ドリフトする"},
  {cat:"運転", en:"Ram into", jp:"ぶつかる", kw:"ram into", ex:"ram into=激突する・体当たりする"},
  {cat:"運転", en:"Run a red light", jp:"信号無視する", kw:"run a red light", ex:"run a red light=赤信号を無視して通過する"},
  {cat:"運転", en:"Lose the cops", jp:"警察をまく", kw:"lose", ex:"lose=失う・まく(追跡者をまく時に使う)"},
  {cat:"運転", en:"I'm going too fast", jp:"スピード出しすぎ", kw:"going too fast", ex:"too=〜すぎる、fast=速い"},
  {cat:"運転", en:"I missed the turn", jp:"ハンドル切り損ねた", kw:"missed the turn", ex:"miss the turn=曲がり損ねる・曲がり角を見逃す"},
  {cat:"運転", en:"I flipped the car", jp:"横転した", kw:"flipped", ex:"flip=ひっくり返す、flip the car=車を横転させる"},
  {cat:"運転", en:"Switch cars", jp:"車を乗り換える", kw:"switch", ex:"switch=切り替える・乗り換える"},
  {cat:"ミッション", en:"Checkpoint", jp:"チェックポイント", kw:"checkpoint", ex:"check=確認+point=地点、進行状況の保存ポイント"},
  {cat:"ミッション", en:"Objective", jp:"目的・目標", kw:"objective", ex:"objective=目標・任務(ゲームのミッション目標でよく使う)"},
  {cat:"ミッション", en:"Side mission", jp:"サブミッション", kw:"side mission", ex:"side=脇・サブ、mission=任務"},
  {cat:"ミッション", en:"Fail state", jp:"ミッション失敗条件", kw:"fail state", ex:"fail=失敗する、state=状態・条件(失敗になる条件)"},
  {cat:"ミッション", en:"Save the game", jp:"セーブする", kw:"save", ex:"save=保存する(ゲームの進行を保存する)"},
  {cat:"ミッション", en:"Load the game", jp:"ロードする", kw:"load", ex:"load=読み込む(保存データを読み込む)"},
  {cat:"ミッション", en:"Progress", jp:"進行状況", kw:"progress", ex:"progress=進歩・進行状況"},
  {cat:"感情リアクション", en:"Oh no!", jp:"やばい！", kw:"oh no", ex:"Oh no=やばい・しまった(軽めの驚きや失望)"},
  {cat:"感情リアクション", en:"No way! Are you serious!?", jp:"マジか！", kw:"no way", ex:"No way=まさか・ありえない(強い驚き)"},
  {cat:"感情リアクション", en:"Oh come on!", jp:"うわ最悪", kw:"come on", ex:"Come on=もう・勘弁して(フラストレーション)"},
  {cat:"感情リアクション", en:"Let's go!", jp:"よっしゃ！", kw:"let's go", ex:"Let's go=行くぞ・よっしゃ(興奮・達成感)"},
  {cat:"感情リアクション", en:"I can't believe this", jp:"信じられない", kw:"can't believe", ex:"can't believe=信じられない"},
  {cat:"感情リアクション", en:"What is happening!?", jp:"何が起きてるんだ", kw:"what is happening", ex:"現在進行形の疑問文=今まさに何が起きてるの？"},
  {cat:"感情リアクション", en:"You've got to be kidding me", jp:"ふざけんな", kw:"kidding", ex:"kid=冗談を言う、You've got to be kidding=冗談でしょ"},
  {cat:"感情リアクション", en:"I'm freaking out", jp:"焦ってる", kw:"freaking out", ex:"freak out=パニックになる・取り乱す"},
  {cat:"感情リアクション", en:"I'm done", jp:"もうダメだ", kw:"I'm done", ex:"done=終わった、I'm done=もうお手上げ・限界"},
  {cat:"感情の強弱", en:"Huh? Wait, what?", jp:"あれ？え、何が起きた", kw:"huh", ex:"Huh=え？(軽い驚き・聞き返し)"},
  {cat:"感情の強弱", en:"Hold on, what just happened?", jp:"ちょっと待て、今何が", kw:"hold on", ex:"hold on=ちょっと待って"},
  {cat:"感情の強弱", en:"Oh my god", jp:"マジか（強め）", kw:"oh my god", ex:"Oh my god=なんてこった(強い驚き・感情表現)"},
  {cat:"感情の強弱", en:"I'm losing my mind", jp:"もう無理（限界）", kw:"losing my mind", ex:"lose one's mind=正気を失う・限界になる"},
  {cat:"カオス・パニック", en:"This is a mess", jp:"めちゃくちゃだ", kw:"mess", ex:"mess=ぐちゃぐちゃな状態・混乱"},
  {cat:"カオス・パニック", en:"I'm completely screwed", jp:"完全に詰んだ", kw:"screwed", ex:"screwed=やられた・詰んだ(口語的な強い表現)"},
  {cat:"カオス・パニック", en:"This is a disaster", jp:"大惨事", kw:"disaster", ex:"disaster=災害・大惨事"},
  {cat:"カオス・パニック", en:"I have no idea what's going on", jp:"わけがわからない", kw:"no idea", ex:"have no idea=全く分からない"},
  {cat:"カオス・パニック", en:"I don't even care anymore", jp:"もう知らん", kw:"don't even care", ex:"don't care=どうでもいい、even=もはや"},
  {cat:"カオス・パニック", en:"How did this happen!?", jp:"何でこうなった", kw:"how did this happen", ex:"how did=どうやって〜したの？(過去の疑問)"},
  {cat:"カオス・パニック", en:"This is out of control", jp:"制御不能", kw:"out of control", ex:"out of control=手に負えない・制御不能"},

  {cat:"実況つなぎ", en:"Let's see", jp:"見てみよう", kw:"let's see", ex:"Let's see=見てみよう・考えてみよう"},
  {cat:"実況つなぎ", en:"Here we go", jp:"行くぞ", kw:"here we go", ex:"Here we go=さあ行くぞ・始まるよ"},
  {cat:"実況つなぎ", en:"This is actually insane", jp:"マジでこれやばい", kw:"actually insane", ex:"actually=実際・意外と、insane=正気じゃない・やばい"},
  {cat:"実況つなぎ", en:"I don't know, let's just go", jp:"わからん、行こう", kw:"let's just go", ex:"just=とりあえず、go=行く"},
  {cat:"ミス・誤解", en:"I think it says...", jp:"たぶんこう言ってる", kw:"I think", ex:"I think=〜だと思う(確信がない時)"},
  {cat:"ミス・誤解", en:"I'm not sure, but...", jp:"自信ないけど", kw:"not sure", ex:"sure=確信している、not sure=自信がない"},
  {cat:"ミス・誤解", en:"I have no idea what this means", jp:"全然わからん", kw:"no idea", ex:"have no idea=全く分からない"},
  {cat:"ミス・誤解", en:"I'll just go this way", jp:"とりあえずこっち行く", kw:"just", ex:"just=とりあえず・ただ(迷いながらの行動)"},
  {cat:"ミス・誤解", en:"Let me ask ChatGPT", jp:"ChatGPTに聞いてみよう", kw:"let me", ex:"let me=〜させて(自分が何かをする時)"},
  {cat:"ミス・誤解", en:"I might have misunderstood", jp:"間違えたかも", kw:"misunderstood", ex:"misunderstand=誤解する(mis=誤って+understand)"},
  {cat:"ミス・誤解", en:"Whatever, let's just go with it", jp:"まあいいや", kw:"go with it", ex:"go with it=それでいく・従う"},
];

// Total: 67 phrases

let activeCats = new Set(DATA.map(d => d.cat));
let filtered = [...DATA];
let curIndex = 0;
let isPlaying = false;
let repeatCount = 1;
let repeatTotal = 5;
let synth = window.speechSynthesis;
let englishVoice = null;
let japaneseVoice = null;
let activeStatusFilter = 'all';
let excludeSpeakable = false;
let excludeKnown = false;
let appMode = 'listen'; // 'listen' or 'quiz'
let quizTimer = null;

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyU-Nz-INLqD-OaBoETh9hDVWxILeNL4JsnMCeEQZrUpkl3eFc3D6vTBi2VtQcCG_BC/exec';
const APP_KEY = 'gta'; // distinguishes this app's data from the intermediate player
const LOCAL_USER_KEY = 'phraseAppUser_v1';

let currentUser = null;
let statusMap = { listen: {}, quiz: {} };
let saveTimer = null;

function scheduleSave() {
  clearTimeout(saveTimer);
  setSyncBadge('保存中...');
  saveTimer = setTimeout(saveStatusMap, 600);
}

function saveStatusMap() {
  if (!currentUser) return;
  const payload = JSON.stringify(statusMap);
  const url = GAS_URL + '?action=save&user=' + encodeURIComponent(APP_KEY + ':' + currentUser) + '&data=' + encodeURIComponent(payload);
  fetch(url)
    .then(r => r.json())
    .then(() => setSyncBadge('保存済み'))
    .catch(() => setSyncBadge('保存失敗(通信を確認)'));
}

function loadFromServer(user) {
  const url = GAS_URL + '?action=load&user=' + encodeURIComponent(APP_KEY + ':' + user);
  return fetch(url)
    .then(r => r.json())
    .then(res => {
      try {
        const parsed = JSON.parse(res.data || '{}');
        if (parsed && (parsed.listen || parsed.quiz)) {
          statusMap = { listen: parsed.listen || {}, quiz: parsed.quiz || {} };
        } else {
          statusMap = { listen: parsed || {}, quiz: {} };
        }
      } catch (e) {
        statusMap = { listen: {}, quiz: {} };
      }
    });
}

function setSyncBadge(text) {
  const badge = document.getElementById('syncBadge');
  badge.style.display = 'block';
  badge.textContent = text;
}

const STATUS_DEFS = [
  { key: 'learning', icon: '!', label: '未習得' },
  { key: 'known', icon: '◯', label: '覚えた' },
  { key: 'speakable', icon: '★', label: '話せる' },
];

function currentBucket() {
  return statusMap[appMode];
}

function getStatus(item) {
  return currentBucket()[item.en] || 'none';
}

function setStatus(item, status) {
  const bucket = currentBucket();
  if (bucket[item.en] === status) {
    delete bucket[item.en];
  } else {
    bucket[item.en] = status;
  }
  scheduleSave();
  renderList();
  renderNowPlayingStatus();
  renderStats();
}

function buildStatusButtonsEl(item) {
  const wrap = document.createElement('div');
  wrap.className = 'status-buttons';
  STATUS_DEFS.forEach(def => {
    const btn = document.createElement('button');
    btn.className = 'status-btn';
    btn.textContent = def.icon;
    btn.title = def.label;
    if (getStatus(item) === def.key) btn.classList.add('active-' + def.key);
    btn.onclick = (e) => {
      e.stopPropagation();
      setStatus(item, def.key);
    };
    wrap.appendChild(btn);
  });
  return wrap;
}

function renderNowPlayingStatus() {
  const el = document.getElementById('nowPlayingStatus');
  el.innerHTML = '';
  if (filtered.length === 0) return;
  el.appendChild(buildStatusButtonsEl(filtered[curIndex]));
}

function renderStats() {
  const counts = { none: 0, learning: 0, known: 0, speakable: 0 };
  DATA.forEach(d => {
    const s = getStatus(d);
    counts[s] = (counts[s] || 0) + 1;
  });
  const statsRow = document.getElementById('statsRow');
  statsRow.innerHTML = `
    <div class="stat-pill"><span class="num">${counts.speakable}</span><span class="label">話せる</span></div>
    <div class="stat-pill"><span class="num">${counts.known}</span><span class="label">覚えた</span></div>
    <div class="stat-pill"><span class="num">${counts.learning}</span><span class="label">未習得</span></div>
    <div class="stat-pill"><span class="num">${counts.none}</span><span class="label">未チェック</span></div>
  `;
}

function buildStatusFilters() {
  const container = document.getElementById('statusFilters');
  container.innerHTML = '';
  const allDefs = [
    { key: 'all', label: 'すべて' },
    { key: 'speakable', label: '★話せる' },
    { key: 'known', label: '◯覚えた' },
    { key: 'learning', label: '!未習得' },
    { key: 'none', label: '未チェック' },
  ];
  allDefs.forEach(def => {
    const chip = document.createElement('div');
    chip.className = 'status-chip' + (activeStatusFilter === def.key ? ' active' : '');
    chip.textContent = def.label;
    chip.onclick = () => {
      activeStatusFilter = def.key;
      applyFilter();
      buildStatusFilters();
    };
    container.appendChild(chip);
  });
}

const phraseEn = document.getElementById('phraseEn');
const phraseJp = document.getElementById('phraseJp');
const catTag = document.getElementById('catTag');
const progressBar = document.getElementById('progressBar');
const curIdxEl = document.getElementById('curIdx');
const totalIdxEl = document.getElementById('totalIdx');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const rateSelect = document.getElementById('rateSelect');
const repeatSelect = document.getElementById('repeatSelect');
const jpToggle = document.getElementById('jpToggle');
const catFilters = document.getElementById('catFilters');
const listContainer = document.getElementById('listContainer');
const voiceHint = document.getElementById('voiceHint');

function loadVoices() {
  const voices = synth.getVoices();
  englishVoice = voices.find(v => v.lang.startsWith('en')) || null;
  japaneseVoice = voices.find(v => v.lang.startsWith('ja')) || null;
  if (!englishVoice) {
    voiceHint.textContent = '英語音声が見つかりません。ブラウザ設定で英語の音声をインストールしてください。';
  } else {
    voiceHint.textContent = '';
  }
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
loadVoices();

function buildFilters() {
  const cats = [...new Set(DATA.map(d => d.cat))];
  catFilters.innerHTML = '';
  cats.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip active';
    chip.textContent = cat;
    chip.onclick = () => {
      if (activeCats.has(cat)) {
        if (activeCats.size === 1) return;
        activeCats.delete(cat);
        chip.classList.remove('active');
      } else {
        activeCats.add(cat);
        chip.classList.add('active');
      }
      applyFilter();
    };
    catFilters.appendChild(chip);
  });
}

function applyFilter() {
  filtered = DATA.filter(d => {
    if (!activeCats.has(d.cat)) return false;
    if (activeStatusFilter !== 'all' && getStatus(d) !== activeStatusFilter) return false;
    if (excludeSpeakable && getStatus(d) === 'speakable') return false;
    if (excludeKnown && getStatus(d) === 'known') return false;
    return true;
  });
  curIndex = 0;
  renderList();
  updateDisplay();
}

function buildExcludeSpeakableToggle() {
  const container = document.getElementById('excludeSpeakableRow');
  container.innerHTML = '';

  const chip1 = document.createElement('div');
  chip1.className = 'status-chip' + (excludeSpeakable ? ' active' : '');
  chip1.textContent = excludeSpeakable ? '★話せるは流さない (ON)' : '★話せるも流す (OFF)';
  chip1.onclick = () => {
    excludeSpeakable = !excludeSpeakable;
    buildExcludeSpeakableToggle();
    applyFilter();
  };
  container.appendChild(chip1);

  const chip2 = document.createElement('div');
  chip2.className = 'status-chip' + (excludeKnown ? ' active' : '');
  chip2.textContent = excludeKnown ? '◯覚えたは流さない (ON)' : '◯覚えたも流す (OFF)';
  chip2.onclick = () => {
    excludeKnown = !excludeKnown;
    buildExcludeSpeakableToggle();
    applyFilter();
  };
  container.appendChild(chip2);
}

function renderList() {
  listContainer.innerHTML = '';
  filtered.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'phrase-row' + (i === curIndex ? ' current' : '');
    const mainDiv = document.createElement('div');
    mainDiv.className = 'row-main';
    mainDiv.innerHTML = `
      <span class="idx">${i + 1}</span>
      <span class="en">${item.en}</span>
      <span class="jp">${item.jp}</span>
    `;
    mainDiv.onclick = () => {
      stopSpeaking();
      curIndex = i;
      updateDisplay();
      if (isPlaying) speakCurrent();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    row.appendChild(mainDiv);
    row.appendChild(buildStatusButtonsEl(item));
    listContainer.appendChild(row);
  });
}

function updateDisplay() {
  if (filtered.length === 0) return;
  const item = filtered[curIndex];
  catTag.textContent = item.cat;
  curIdxEl.textContent = (curIndex + 1) + ' / ' + filtered.length;
  totalIdxEl.textContent = '';
  progressBar.style.width = ((curIndex) / Math.max(filtered.length - 1, 1)) * 100 + '%';

  const phraseJpQuiz = document.getElementById('phraseJpQuiz');

  if (appMode === 'quiz') {
    phraseJpQuiz.style.display = 'block';
    phraseJpQuiz.textContent = item.jp;
    phraseEn.textContent = '？？？';
    phraseEn.style.opacity = '0.3';
    phraseJp.textContent = '';
    document.getElementById('kwBox').style.display = 'none';
  } else {
    phraseJpQuiz.style.display = 'none';
    phraseEn.textContent = item.en;
    phraseEn.style.opacity = '1';
    phraseJp.textContent = item.jp;
    if (item.kw) {
      document.getElementById('kwWord').textContent = item.kw;
      document.getElementById('kwEx').textContent = item.ex || '';
      document.getElementById('kwBox').style.display = 'block';
    } else {
      document.getElementById('kwBox').style.display = 'none';
    }
  }

  document.querySelectorAll('.phrase-row').forEach((r, i) => {
    r.classList.toggle('current', i === curIndex);
  });
  renderNowPlayingStatus();
}

function revealAnswer() {
  if (filtered.length === 0) return;
  const item = filtered[curIndex];
  phraseEn.textContent = item.en;
  phraseEn.style.opacity = '1';
}

function speakCurrent() {
  if (filtered.length === 0) return;
  const item = filtered[curIndex];
  const rate = parseFloat(rateSelect.value);
  const wantJp = jpToggle.value === 'yes';

  if (appMode === 'quiz') {
    const thinkMs = parseInt(document.getElementById('thinkTimeSelect').value);
    clearTimeout(quizTimer);

    if (japaneseVoice) {
      const uttJpFirst = new SpeechSynthesisUtterance(item.jp);
      uttJpFirst.lang = 'ja-JP';
      uttJpFirst.voice = japaneseVoice;
      uttJpFirst.rate = 1;
      uttJpFirst.onend = () => {
        quizTimer = setTimeout(() => {
          if (!isPlaying) return;
          revealAnswer();
          speakEnglishThenAdvance(item, rate);
        }, thinkMs);
      };
      synth.cancel();
      synth.speak(uttJpFirst);
    } else {
      quizTimer = setTimeout(() => {
        if (!isPlaying) return;
        revealAnswer();
        speakEnglishThenAdvance(item, rate);
      }, thinkMs);
    }
    return;
  }

  speakEnglishThenAdvance(item, rate, wantJp);
}

function speakEnglishThenAdvance(item, rate, wantJp) {
  const uttEn = new SpeechSynthesisUtterance(item.en);
  uttEn.lang = 'en-US';
  uttEn.rate = rate;
  if (englishVoice) uttEn.voice = englishVoice;

  uttEn.onend = () => {
    repeatCount++;
    if (repeatCount < repeatTotal) {
      if (isPlaying) speakEnglishThenAdvance(item, rate, wantJp);
      return;
    }
    repeatCount = 0;
    const reviewMs = (appMode === 'quiz') ? parseInt(document.getElementById('reviewTimeSelect').value) : 0;
    const proceed = () => {
      if (!isPlaying) return;
      if (wantJp && japaneseVoice) {
        const uttJp = new SpeechSynthesisUtterance(item.jp);
        uttJp.lang = 'ja-JP';
        uttJp.voice = japaneseVoice;
        uttJp.rate = 1;
        uttJp.onend = () => { if (isPlaying) goNext(true); };
        synth.speak(uttJp);
      } else {
        goNext(true);
      }
    };
    if (reviewMs > 0) {
      clearTimeout(quizTimer);
      quizTimer = setTimeout(proceed, reviewMs);
    } else {
      proceed();
    }
  };

  synth.cancel();
  synth.speak(uttEn);
}

function goNext(auto) {
  curIndex = (curIndex + 1) % filtered.length;
  updateDisplay();
  if (isPlaying) speakCurrent();
}

function goPrev() {
  stopSpeaking();
  curIndex = (curIndex - 1 + filtered.length) % filtered.length;
  updateDisplay();
  if (isPlaying) speakCurrent();
}

function stopSpeaking() {
  synth.cancel();
  clearTimeout(quizTimer);
  repeatCount = 0;
}

function buildModeFilters() {
  const container = document.getElementById('modeFilters');
  container.innerHTML = '';
  const modes = [
    { key: 'listen', label: '聞き流しモード' },
    { key: 'quiz', label: 'クイズモード(日本語→考える→答え)' },
  ];
  modes.forEach(m => {
    const chip = document.createElement('div');
    chip.className = 'status-chip' + (appMode === m.key ? ' active' : '');
    chip.textContent = m.label;
    chip.onclick = () => {
      stopSpeaking();
      isPlaying = false;
      playBtn.textContent = '▶';
      appMode = m.key;
      document.getElementById('jpToggleWrap').style.display = (appMode === 'listen') ? 'block' : 'none';
      document.getElementById('thinkTimeWrap').style.display = (appMode === 'quiz') ? 'block' : 'none';
      document.getElementById('reviewTimeWrap').style.display = (appMode === 'quiz') ? 'block' : 'none';
      buildModeFilters();
      applyFilter();
      renderStats();
      updateDisplay();
    };
    container.appendChild(chip);
  });
}

playBtn.onclick = () => {
  isPlaying = !isPlaying;
  playBtn.textContent = isPlaying ? '⏸' : '▶';
  if (isPlaying) {
    repeatCount = 0;
    if (appMode === 'quiz') updateDisplay();
    speakCurrent();
  } else {
    stopSpeaking();
  }
};

nextBtn.onclick = () => { stopSpeaking(); goNext(); };
prevBtn.onclick = goPrev;

repeatSelect.onchange = () => { repeatTotal = parseInt(repeatSelect.value); };

function initApp() {
  buildFilters();
  buildStatusFilters();
  buildModeFilters();
  buildExcludeSpeakableToggle();
  renderStats();
  renderList();
  updateDisplay();
}

function startSession(user) {
  currentUser = user;
  localStorage.setItem(LOCAL_USER_KEY, user);
  document.getElementById('loginStatus').textContent = '読み込み中...';
  loadFromServer(user).then(() => {
    document.getElementById('loginOverlay').style.display = 'none';
    setSyncBadge(user + ' で同期中');
    initApp();
  }).catch(() => {
    document.getElementById('loginStatus').textContent = '通信に失敗しました。もう一度お試しください。';
  });
}

document.getElementById('loginBtn').onclick = () => {
  const val = document.getElementById('passInput').value.trim();
  if (!val) {
    document.getElementById('loginStatus').textContent = '合言葉を入力してください';
    return;
  }
  startSession(val);
};
document.getElementById('passInput').onkeydown = (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
};

document.getElementById('syncBadge').onclick = () => {
  if (currentUser) loadFromServer(currentUser).then(() => {
    setSyncBadge(currentUser + ' で同期中(更新済み)');
    initApp();
  });
};

const savedUser = localStorage.getItem(LOCAL_USER_KEY);
if (savedUser) {
  document.getElementById('passInput').value = savedUser;
  startSession(savedUser);
}
</script>
