
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中級フレーズ(GTA選別版) 聞き流しプレイヤー</title>
<style>
  :root {
    --bg: #14110f;
    --panel: #1c1815;
    --amber: #ff8c2e;
    --amber-dim: #c4691a;
    --text: #ede5d8;
    --text-dim: #968d7f;
    --line: #2e2822;
    --red: #d4453a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
    padding: 32px 16px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }


  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--line);
    border-radius: 99px;
    padding: 6px 14px;
    margin-bottom: 16px;
    transition: 0.15s;
  }
  .back-link:hover { border-color: var(--amber-dim); color: var(--amber); }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--amber-dim);
    text-transform: uppercase;
    font-weight: 700;
  }
  h1 {
    font-size: 26px;
    margin: 4px 0 24px;
    letter-spacing: -0.01em;
  }
  h1 span { color: var(--amber); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .now-playing {
    text-align: center;
    padding: 28px 16px;
  }
  .cat-tag {
    display: inline-block;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    border-radius: 99px;
    padding: 3px 10px;
    margin-bottom: 16px;
  }
  .phrase-en {
    font-size: 34px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 10px;
    min-height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phrase-jp {
    font-size: 18px;
    color: var(--text-dim);
  }

  .progress {
    height: 3px;
    background: var(--line);
    border-radius: 99px;
    overflow: hidden;
    margin: 20px 0 4px;
  }
  .progress-bar {
    height: 100%;
    background: var(--amber);
    width: 0%;
    transition: width 0.2s linear;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-top: 20px;
  }
  .btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 99px;
    cursor: pointer;
    transition: 0.15s;
  }
  .btn:hover { border-color: var(--amber-dim); }
  .btn-skip { width: 44px; height: 44px; font-size: 16px; }
  .btn-play {
    width: 64px; height: 64px;
    font-size: 22px;
    background: var(--amber);
    border: none;
    color: #1a1208;
  }
  .btn-play:hover { background: #ffa14f; }

  .settings-row {
    display: flex;
    gap: 12px;
    margin-top: 18px;
  }
  .settings-row > div { flex: 1; }
  label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  select, input[type=range] {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px;
    font-size: 13px;
  }

  .cat-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .cat-chip {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 99px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .cat-chip.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(255,140,46,0.08);
  }

  .list-title {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  .phrase-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
  }
  .phrase-row:hover { background: var(--bg); }
  .phrase-row.current { background: rgba(255,140,46,0.1); }
  .phrase-row .en { font-weight: 600; }
  .phrase-row .jp { color: var(--text-dim); font-size: 14px; }
  .phrase-row .idx {
    color: var(--amber-dim);
    font-size: 11px;
    width: 24px;
    flex-shrink: 0;
  }
  .row-main { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .row-main .en, .row-main .jp { white-space: normal; }
  .row-main .idx { align-self: flex-start; }

  .status-buttons {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .status-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: 0.15s;
  }
  .status-btn:hover { border-color: var(--amber-dim); }
  .status-btn.active-learning {
    background: rgba(196,105,26,0.25);
    border-color: var(--amber-dim);
    color: var(--amber);
  }
  .status-btn.active-known {
    background: rgba(255,140,46,0.3);
    border-color: var(--amber);
    color: var(--amber);
  }
  .status-btn.active-speakable {
    background: var(--amber);
    border-color: var(--amber);
    color: #1a1208;
  }

  .now-playing .status-buttons {
    justify-content: center;
    margin: 14px 0 0;
  }
  .now-playing .status-btn {
    width: 36px;
    height: 36px;
    font-size: 13px;
  }
  .status-label {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 4px;
  }

  .stats-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 11px;
  }
  .stat-pill {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--line);
  }
  .stat-pill .num { font-size: 16px; font-weight: 700; color: var(--amber); display: block; }
  .stat-pill .label { color: var(--text-dim); }

  .status-filter-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .status-chip {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 99px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
  }
  .status-chip.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(255,140,46,0.08);
  }

  .hint {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-top: 4px;
  }

  .login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .login-box h2 { font-size: 18px; margin: 0 0 6px; }
  .login-box p { font-size: 12px; color: var(--text-dim); margin: 0 0 20px; }
  .login-box input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    margin-bottom: 12px;
    text-align: center;
  }
  .login-box button {
    width: 100%;
    background: var(--amber);
    border: none;
    color: #1a1208;
    font-weight: 700;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
  }
  .login-status {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    min-height: 14px;
  }
  .sync-badge {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 99px;
    padding: 4px 10px;
    z-index: 10;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>合言葉を入力</h2>
    <p>PCとiPhoneで同じ合言葉を使うとデータが共有されます</p>
    <input type="text" id="passInput" placeholder="例: kouji2026" autocomplete="off">
    <button id="loginBtn">開始する</button>
    <div class="login-status" id="loginStatus"></div>
  </div>
</div>

<div class="sync-badge" id="syncBadge" style="display:none;"></div>

<div class="wrap">
  <a class="back-link" href="index.html">← トップに戻る</a>
  <div class="eyebrow">瞬間英作文 中級 / GTA選別版</div>
  <h1>中級<span>フレーズ</span></h1>

  <div class="panel" style="padding:14px 20px;">
    <div class="status-filter-row" id="modeFilters" style="margin-top:0;"></div>
  </div>

  <div class="panel now-playing">
    <div class="cat-tag" id="catTag">状況描写</div>
    <div class="phrase-jp" id="phraseJpQuiz" style="display:none; font-size:26px; font-weight:700; color:var(--text); margin-bottom:18px;"></div>
    <div class="phrase-en" id="phraseEn">Loading...</div>
    <div class="phrase-jp" id="phraseJp"></div>
    <div id="kwBox" style="display:none; margin-top:14px; background:rgba(255,140,46,0.08); border:1px solid var(--amber-dim); border-radius:8px; padding:12px 14px; text-align:left;">
      <div id="kwWord" style="font-size:15px; font-weight:700; color:var(--amber); margin-bottom:4px;"></div>
      <div id="kwEx" style="font-size:13px; color:var(--text-dim); line-height:1.6;"></div>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label"><span id="curIdx">0</span><span id="totalIdx">0</span></div>

    <div class="controls">
      <button class="btn btn-skip" id="prevBtn">⏮</button>
      <button class="btn btn-play" id="playBtn">▶</button>
      <button class="btn btn-skip" id="nextBtn">⏭</button>
    </div>

    <div class="settings-row">
      <div>
        <label>速度</label>
        <select id="rateSelect">
          <option value="0.8" selected>遅め (0.8x)</option>
          <option value="1">標準 (1.0x)</option>
          <option value="1.2">やや速い (1.2x)</option>
        </select>
      </div>
      <div>
        <label>リピート回数</label>
        <select id="repeatSelect">
          <option value="1">1回</option>
          <option value="2">2回</option>
          <option value="3">3回</option>
          <option value="4">4回</option>
          <option value="5" selected>5回</option>
          <option value="6">6回</option>
          <option value="7">7回</option>
          <option value="8">8回</option>
          <option value="9">9回</option>
          <option value="10">10回</option>
        </select>
      </div>
      <div id="jpToggleWrap">
        <label>日本語も読む</label>
        <select id="jpToggle">
          <option value="no">英語のみ</option>
          <option value="yes" selected>英→日</option>
        </select>
      </div>
      <div id="thinkTimeWrap" style="display:none;">
        <label>考える時間</label>
        <select id="thinkTimeSelect">
          <option value="3000">3秒</option>
          <option value="5000" selected>5秒</option>
          <option value="8000">8秒</option>
          <option value="15000">15秒</option>
          <option value="20000">20秒</option>
        </select>
      </div>
      <div id="reviewTimeWrap" style="display:none;">
        <label>答え確認時間</label>
        <select id="reviewTimeSelect">
          <option value="3000">3秒</option>
          <option value="5000">5秒</option>
          <option value="8000" selected>8秒</option>
          <option value="10000">10秒</option>
          <option value="15000">15秒</option>
          <option value="20000">20秒</option>
        </select>
      </div>
    </div>

    <div class="hint" id="voiceHint"></div>

    <div class="status-buttons" id="nowPlayingStatus"></div>
    <div class="status-label">タップして習熟度を記録(端末に保存されます)</div>
  </div>

  <div class="panel">
    <div class="stats-row" id="statsRow"></div>
    <div class="status-filter-row" id="statusFilters"></div>
    <div class="status-filter-row" id="excludeSpeakableRow" style="margin-top:8px;"></div>
  </div>

  <div class="panel">
    <div class="cat-filters" id="catFilters"></div>
  </div>

  <div class="panel">
    <div class="list-title">フレーズ一覧（タップで再生）</div>
    <div id="listContainer"></div>
  </div>
</div>

<script>
const DATA = [
  {cat:"基本文型", en:"The room smells good", jp:"部屋がいい匂いがする", kw:"smells good", ex:"smell=〜の匂いがする(知覚動詞)、good=良い"},
  {cat:"to不定詞", en:"I had to study yesterday", jp:"昨日勉強しなきゃだった", kw:"had to", ex:"had to=〜しなければならなかった(have toの過去形)"},
  {cat:"to不定詞", en:"We are glad to see you again", jp:"また会えて嬉しいです", kw:"glad to", ex:"glad to=〜して嬉しい(感情+to不定詞のパターン)"},
  {cat:"基本文型", en:"It is the coldest today this year", jp:"今年で今日が一番寒い", kw:"the coldest", ex:"coldest=最も寒い(coldの最上級)、the+最上級で使う"},
  {cat:"to不定詞", en:"She studies hard to become a doctor", jp:"医者になるために猛勉強してる", kw:"to become", ex:"to become=〜になるために(目的を表すto不定詞)"},
  {cat:"基本文型", en:"They finished their work early", jp:"彼らは仕事を早く終えた", kw:"finished", ex:"finish=終える(finishの過去形がfinished)"},
  {cat:"to不定詞", en:"She gave this flower to him", jp:"彼女はこの花を彼にあげた", kw:"gave to", ex:"give A to B=BにAを与える(giveの過去形がgave)"},
  {cat:"基本文型", en:"I will run five kilometers tomorrow", jp:"明日5キロ走る", kw:"will run", ex:"will=〜するだろう・するつもり(未来を表す助動詞)"},
  {cat:"to不定詞", en:"I will take a trip to Europe next year", jp:"来年ヨーロッパ旅行する", kw:"take a trip", ex:"take a trip=旅行する"},
  {cat:"比較・最上級", en:"She runs faster than me", jp:"彼女は私より速く走る", kw:"faster than", ex:"faster=より速い(fastの比較級)、than=〜より"},
  {cat:"比較・最上級", en:"His cake is sweeter than mine", jp:"彼のケーキは私のより甘い", kw:"sweeter than", ex:"sweeter=より甘い(sweetの比較級)"},
  {cat:"現在完了", en:"Has she been studying English for a year", jp:"彼女は1年間英語を勉強してるの？", kw:"has been studying", ex:"has been+ing=ずっと〜している(現在完了進行形)"},
  {cat:"比較・最上級", en:"This bag is bigger than the other", jp:"このバッグはもう片方より大きい", kw:"bigger than", ex:"bigger=より大きい(bigの比較級、gを重ねる)"},
  {cat:"助動詞", en:"I have to work today", jp:"今日仕事しなきゃ", kw:"have to", ex:"have to=〜しなければならない(mustの口語版)"},
  {cat:"基本文型", en:"This car is not the newest in the world", jp:"この車は世界で一番新しいわけじゃない", kw:"the newest", ex:"newest=最も新しい(newの最上級)"},
  {cat:"to不定詞", en:"We went to the park yesterday", jp:"昨日公園に行った", kw:"went to", ex:"went=行った(goの過去形)"},
  {cat:"to不定詞", en:"Were you going to attend the meeting", jp:"会議に出る予定だった？", kw:"going to", ex:"be going to=〜するつもりだった(過去の予定)"},
  {cat:"基本文型", en:"The fruit grew ripe", jp:"果物が熟した", kw:"grew ripe", ex:"grow+形容詞=〜になる(growの過去形がgrew)、ripe=熟した"},
  {cat:"基本文型", en:"I wasn't singing at the party then", jp:"あの時パーティで歌ってなかった", kw:"wasn't singing", ex:"was/were+ing=〜していた(過去進行形)"},
  {cat:"基本文型", en:"These flowers are loved by her", jp:"これらの花は彼女に愛されている", kw:"loved by", ex:"be loved by=〜に愛されている(受動態)"},
  {cat:"助動詞", en:"Shall I open the window", jp:"窓開けようか", kw:"shall I", ex:"Shall I=〜しましょうか？(申し出を表す)"},
  {cat:"基本文型", en:"She bought her baby a toy", jp:"彼女は赤ちゃんにおもちゃを買った", kw:"bought", ex:"buy=買う(buyの過去形がbought)、SVOOの形"},
  {cat:"基本文型", en:"I made this cake for my mother", jp:"母のためにこのケーキを作った", kw:"made for", ex:"make A for B=BのためにAを作る"},
  {cat:"基本文型", en:"He played the guitar", jp:"彼はギターを弾いた", kw:"played", ex:"play=演奏する(playの過去形がplayed)"},
  {cat:"基本文型", en:"Can she read a book fast", jp:"彼女は本を速く読める？", kw:"can", ex:"can=〜できる(能力を表す助動詞)"},
  {cat:"基本文型", en:"Are those your pictures", jp:"それらはあなたの写真？", kw:"are those", ex:"those=あれら(thatの複数形)"},
  {cat:"進行形", en:"I am eating breakfast", jp:"朝食食べてる", kw:"am eating", ex:"am/is/are+ing=〜している(現在進行形)"},
  {cat:"助動詞", en:"Shall I turn on the light", jp:"電気つけようか", kw:"turn on", ex:"turn on=つける(電気などをつける)、turn off=消す"},
  {cat:"基本文型", en:"Will you please marry me", jp:"結婚してくれる？", kw:"will you please", ex:"will you please=〜してくれますか？(丁寧な依頼)"},
  {cat:"基本文型", en:"I gave my dog a bone", jp:"犬に骨をあげた", kw:"gave", ex:"give=与える(giveの過去形がgave)、SVOO形"},
  {cat:"基本文型", en:"Who is the tallest person in your family", jp:"あなたの家族で一番背が高いのは誰？", kw:"the tallest", ex:"tallest=最も背が高い(tallの最上級)"},
  {cat:"to不定詞", en:"I'm not going to watch TV tonight", jp:"今夜テレビ見ない", kw:"not going to", ex:"be not going to=〜するつもりはない"},
  {cat:"比較・最上級", en:"She is taller than him", jp:"彼女は彼より背が高い", kw:"taller than", ex:"taller=より背が高い(tallの比較級)"},
  {cat:"現在完了", en:"I have known him for three years", jp:"彼とは3年来の知り合いだ", kw:"have known", ex:"have+過去分詞=〜したことがある・している(現在完了)"},
  {cat:"基本文型", en:"What did you eat this morning", jp:"今朝何食べた？", kw:"what did", ex:"what=何、did=過去の疑問文を作る助動詞"},
  {cat:"基本文型", en:"Could you fix the broken chair yesterday", jp:"昨日壊れた椅子を直せた？", kw:"could you", ex:"could=〜できた(canの過去形)、Could you=〜できましたか？"},
  {cat:"基本文型", en:"Can you swim well", jp:"上手に泳げる？", kw:"swim well", ex:"swim=泳ぐ、well=上手に"},
  {cat:"to不定詞", en:"She was nervous to give a speech", jp:"彼女はスピーチで緊張してた", kw:"nervous to", ex:"nervous=緊張した、to give=〜するのに(感情+to不定詞)"},
  {cat:"助動詞", en:"You must not speak here", jp:"ここで話しちゃダメ", kw:"must not", ex:"must not=〜してはいけない(禁止)"},
  {cat:"基本文型", en:"I will eat sushi tonight", jp:"今夜寿司食べる", kw:"will eat", ex:"will=〜するつもり(意志の未来)"},
  {cat:"受動態", en:"The cake was baked by my mom", jp:"ケーキは母が焼いた", kw:"was baked by", ex:"be baked by=〜によって焼かれた(受動態)"},
  {cat:"to不定詞", en:"She writes a letter to me", jp:"彼女は私に手紙を書く", kw:"writes to", ex:"write A to B=BにAを書く"},
  {cat:"助動詞", en:"Shall we go to the park together", jp:"一緒に公園行こうか", kw:"shall we", ex:"Shall we=〜しましょうか？(提案)"},

  {cat:"基本文型", en:"He looks tired", jp:"彼は疲れて見える", kw:"looks tired", ex:"look+形容詞=〜に見える(知覚動詞)"},
];

let activeCats = new Set(DATA.map(d => d.cat));
let filtered = [...DATA];
let curIndex = 0;
let isPlaying = false;
let repeatCount = 1;
let repeatTotal = 5;
let synth = window.speechSynthesis;
let englishVoice = null;
let japaneseVoice = null;
let activeStatusFilter = 'all';
let excludeSpeakable = false;
let excludeKnown = false;
let appMode = 'listen'; // 'listen' or 'quiz'
let quizTimer = null;

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyU-Nz-INLqD-OaBoETh9hDVWxILeNL4JsnMCeEQZrUpkl3eFc3D6vTBi2VtQcCG_BC/exec';
const APP_KEY = 'intermediate'; // distinguishes this app's data from the gta player
const LOCAL_USER_KEY = 'phraseAppUser_v1';

let currentUser = null;
let statusMap = { listen: {}, quiz: {} };
let saveTimer = null;

function loadStatusMap() {
  return statusMap;
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setSyncBadge('保存中...');
  saveTimer = setTimeout(saveStatusMap, 600);
}

function saveStatusMap() {
  if (!currentUser) return;
  const payload = JSON.stringify(statusMap);
  const url = GAS_URL + '?action=save&user=' + encodeURIComponent(APP_KEY + ':' + currentUser) + '&data=' + encodeURIComponent(payload);
  fetch(url)
    .then(r => r.json())
    .then(() => setSyncBadge('保存済み'))
    .catch(() => setSyncBadge('保存失敗(通信を確認)'));
}

function loadFromServer(user) {
  const url = GAS_URL + '?action=load&user=' + encodeURIComponent(APP_KEY + ':' + user);
  return fetch(url)
    .then(r => r.json())
    .then(res => {
      try {
        const parsed = JSON.parse(res.data || '{}');
        // migrate old flat-format data (pre mode-split) into "listen" bucket
        if (parsed && (parsed.listen || parsed.quiz)) {
          statusMap = { listen: parsed.listen || {}, quiz: parsed.quiz || {} };
        } else {
          statusMap = { listen: parsed || {}, quiz: {} };
        }
      } catch (e) {
        statusMap = { listen: {}, quiz: {} };
      }
    });
}

function setSyncBadge(text) {
  const badge = document.getElementById('syncBadge');
  badge.style.display = 'block';
  badge.textContent = text;
}

const STATUS_DEFS = [
  { key: 'learning', icon: '!', label: '未習得' },
  { key: 'known', icon: '◯', label: '覚えた' },
  { key: 'speakable', icon: '★', label: '話せる' },
];

function currentBucket() {
  return statusMap[appMode];
}

function getStatus(item) {
  return currentBucket()[item.en] || 'none';
}

function setStatus(item, status) {
  const bucket = currentBucket();
  if (bucket[item.en] === status) {
    delete bucket[item.en];
  } else {
    bucket[item.en] = status;
  }
  scheduleSave();
  renderList();
  renderNowPlayingStatus();
  renderStats();
}

function buildStatusButtonsEl(item, large) {
  const wrap = document.createElement('div');
  wrap.className = 'status-buttons';
  STATUS_DEFS.forEach(def => {
    const btn = document.createElement('button');
    btn.className = 'status-btn';
    btn.textContent = def.icon;
    btn.title = def.label;
    if (getStatus(item) === def.key) btn.classList.add('active-' + def.key);
    btn.onclick = (e) => {
      e.stopPropagation();
      setStatus(item, def.key);
    };
    wrap.appendChild(btn);
  });
  return wrap;
}

function renderNowPlayingStatus() {
  const el = document.getElementById('nowPlayingStatus');
  el.innerHTML = '';
  if (filtered.length === 0) return;
  el.appendChild(buildStatusButtonsEl(filtered[curIndex], true));
}

function renderStats() {
  const counts = { none: 0, learning: 0, known: 0, speakable: 0 };
  DATA.forEach(d => {
    const s = getStatus(d);
    counts[s] = (counts[s] || 0) + 1;
  });
  const statsRow = document.getElementById('statsRow');
  statsRow.innerHTML = `
    <div class="stat-pill"><span class="num">${counts.speakable}</span><span class="label">話せる</span></div>
    <div class="stat-pill"><span class="num">${counts.known}</span><span class="label">覚えた</span></div>
    <div class="stat-pill"><span class="num">${counts.learning}</span><span class="label">未習得</span></div>
    <div class="stat-pill"><span class="num">${counts.none}</span><span class="label">未チェック</span></div>
  `;
}

function buildStatusFilters() {
  const container = document.getElementById('statusFilters');
  container.innerHTML = '';
  const allDefs = [
    { key: 'all', label: 'すべて' },
    { key: 'speakable', label: '★話せる' },
    { key: 'known', label: '◯覚えた' },
    { key: 'learning', label: '!未習得' },
    { key: 'none', label: '未チェック' },
  ];
  allDefs.forEach(def => {
    const chip = document.createElement('div');
    chip.className = 'status-chip' + (activeStatusFilter === def.key ? ' active' : '');
    chip.textContent = def.label;
    chip.onclick = () => {
      activeStatusFilter = def.key;
      applyFilter();
      buildStatusFilters();
    };
    container.appendChild(chip);
  });
}


const phraseEn = document.getElementById('phraseEn');
const phraseJp = document.getElementById('phraseJp');
const catTag = document.getElementById('catTag');
const progressBar = document.getElementById('progressBar');
const curIdxEl = document.getElementById('curIdx');
const totalIdxEl = document.getElementById('totalIdx');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const rateSelect = document.getElementById('rateSelect');
const repeatSelect = document.getElementById('repeatSelect');
const jpToggle = document.getElementById('jpToggle');
const catFilters = document.getElementById('catFilters');
const listContainer = document.getElementById('listContainer');
const voiceHint = document.getElementById('voiceHint');

function loadVoices() {
  const voices = synth.getVoices();
  englishVoice = voices.find(v => v.lang.startsWith('en')) || null;
  japaneseVoice = voices.find(v => v.lang.startsWith('ja')) || null;
  if (!englishVoice) {
    voiceHint.textContent = '英語音声が見つかりません。ブラウザ設定で英語の音声をインストールしてください。';
  } else {
    voiceHint.textContent = '';
  }
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
loadVoices();

function buildFilters() {
  const cats = [...new Set(DATA.map(d => d.cat))];
  catFilters.innerHTML = '';
  cats.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip active';
    chip.textContent = cat;
    chip.onclick = () => {
      if (activeCats.has(cat)) {
        if (activeCats.size === 1) return;
        activeCats.delete(cat);
        chip.classList.remove('active');
      } else {
        activeCats.add(cat);
        chip.classList.add('active');
      }
      applyFilter();
    };
    catFilters.appendChild(chip);
  });
}

function applyFilter() {
  filtered = DATA.filter(d => {
    if (!activeCats.has(d.cat)) return false;
    if (activeStatusFilter !== 'all' && getStatus(d) !== activeStatusFilter) return false;
    if (excludeSpeakable && getStatus(d) === 'speakable') return false;
    if (excludeKnown && getStatus(d) === 'known') return false;
    return true;
  });
  curIndex = 0;
  renderList();
  updateDisplay();
}

function buildExcludeSpeakableToggle() {
  const container = document.getElementById('excludeSpeakableRow');
  container.innerHTML = '';

  const chip1 = document.createElement('div');
  chip1.className = 'status-chip' + (excludeSpeakable ? ' active' : '');
  chip1.textContent = excludeSpeakable ? '★話せるは流さない (ON)' : '★話せるも流す (OFF)';
  chip1.onclick = () => {
    excludeSpeakable = !excludeSpeakable;
    buildExcludeSpeakableToggle();
    applyFilter();
  };
  container.appendChild(chip1);

  const chip2 = document.createElement('div');
  chip2.className = 'status-chip' + (excludeKnown ? ' active' : '');
  chip2.textContent = excludeKnown ? '◯覚えたは流さない (ON)' : '◯覚えたも流す (OFF)';
  chip2.onclick = () => {
    excludeKnown = !excludeKnown;
    buildExcludeSpeakableToggle();
    applyFilter();
  };
  container.appendChild(chip2);
}

function renderList() {
  listContainer.innerHTML = '';
  filtered.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'phrase-row' + (i === curIndex ? ' current' : '');
    const mainDiv = document.createElement('div');
    mainDiv.className = 'row-main';
    mainDiv.innerHTML = `
      <span class="idx">${i + 1}</span>
      <span class="en">${item.en}</span>
      <span class="jp">${item.jp}</span>
    `;
    mainDiv.onclick = () => {
      stopSpeaking();
      curIndex = i;
      updateDisplay();
      if (isPlaying) speakCurrent();
    };
    row.appendChild(mainDiv);
    row.appendChild(buildStatusButtonsEl(item, false));
    listContainer.appendChild(row);
  });
}

function updateDisplay() {
  if (filtered.length === 0) return;
  const item = filtered[curIndex];
  catTag.textContent = item.cat;
  curIdxEl.textContent = (curIndex + 1) + ' / ' + filtered.length;
  totalIdxEl.textContent = '';
  progressBar.style.width = ((curIndex) / Math.max(filtered.length - 1, 1)) * 100 + '%';

  const phraseJpQuiz = document.getElementById('phraseJpQuiz');

  if (appMode === 'quiz') {
    // show Japanese first, hide English, then reveal after thinking time
    phraseJpQuiz.style.display = 'block';
    phraseJpQuiz.textContent = item.jp;
    phraseEn.textContent = '？？？';
    phraseEn.style.opacity = '0.3';
    phraseJp.textContent = '';
    document.getElementById('kwBox').style.display = 'none';
  } else {
    phraseJpQuiz.style.display = 'none';
    phraseEn.textContent = item.en;
    phraseEn.style.opacity = '1';
    phraseJp.textContent = item.jp;
    if (item.kw) {
      document.getElementById('kwWord').textContent = item.kw;
      document.getElementById('kwEx').textContent = item.ex || '';
      document.getElementById('kwBox').style.display = 'block';
    } else {
      document.getElementById('kwBox').style.display = 'none';
    }
  }

  document.querySelectorAll('.phrase-row').forEach((r, i) => {
    r.classList.toggle('current', i === curIndex);
  });
  renderNowPlayingStatus();
}

function revealAnswer() {
  if (filtered.length === 0) return;
  const item = filtered[curIndex];
  phraseEn.textContent = item.en;
  phraseEn.style.opacity = '1';
}

function speakCurrent() {
  if (filtered.length === 0) return;
  const item = filtered[curIndex];
  const rate = parseFloat(rateSelect.value);
  const wantJp = jpToggle.value === 'yes';

  if (appMode === 'quiz') {
    // speak Japanese first, then wait remaining thinking time, then reveal + speak English
    const thinkMs = parseInt(document.getElementById('thinkTimeSelect').value);
    clearTimeout(quizTimer);

    if (japaneseVoice) {
      const uttJpFirst = new SpeechSynthesisUtterance(item.jp);
      uttJpFirst.lang = 'ja-JP';
      uttJpFirst.voice = japaneseVoice;
      uttJpFirst.rate = 1;
      uttJpFirst.onend = () => {
        quizTimer = setTimeout(() => {
          if (!isPlaying) return;
          revealAnswer();
          speakEnglishThenAdvance(item, rate);
        }, thinkMs);
      };
      synth.cancel();
      synth.speak(uttJpFirst);
    } else {
      quizTimer = setTimeout(() => {
        if (!isPlaying) return;
        revealAnswer();
        speakEnglishThenAdvance(item, rate);
      }, thinkMs);
    }
    return;
  }

  speakEnglishThenAdvance(item, rate, wantJp);
}

function speakEnglishThenAdvance(item, rate, wantJp) {
  const uttEn = new SpeechSynthesisUtterance(item.en);
  uttEn.lang = 'en-US';
  uttEn.rate = rate;
  if (englishVoice) uttEn.voice = englishVoice;

  uttEn.onend = () => {
    repeatCount++;
    if (repeatCount < repeatTotal) {
      if (isPlaying) speakEnglishThenAdvance(item, rate, wantJp);
      return;
    }
    repeatCount = 0;
    const reviewMs = (appMode === 'quiz') ? parseInt(document.getElementById('reviewTimeSelect').value) : 0;
    const proceed = () => {
      if (!isPlaying) return;
      if (wantJp && japaneseVoice) {
        const uttJp = new SpeechSynthesisUtterance(item.jp);
        uttJp.lang = 'ja-JP';
        uttJp.voice = japaneseVoice;
        uttJp.rate = 1;
        uttJp.onend = () => { if (isPlaying) goNext(true); };
        synth.speak(uttJp);
      } else {
        goNext(true);
      }
    };
    if (reviewMs > 0) {
      clearTimeout(quizTimer);
      quizTimer = setTimeout(proceed, reviewMs);
    } else {
      proceed();
    }
  };

  synth.cancel();
  synth.speak(uttEn);
}

function goNext(auto) {
  curIndex = (curIndex + 1) % filtered.length;
  updateDisplay();
  if (isPlaying) speakCurrent();
}

function goPrev() {
  stopSpeaking();
  curIndex = (curIndex - 1 + filtered.length) % filtered.length;
  updateDisplay();
  if (isPlaying) speakCurrent();
}

function stopSpeaking() {
  synth.cancel();
  clearTimeout(quizTimer);
  repeatCount = 0;
}

function buildModeFilters() {
  const container = document.getElementById('modeFilters');
  container.innerHTML = '';
  const modes = [
    { key: 'listen', label: '聞き流しモード' },
    { key: 'quiz', label: 'クイズモード(日本語→考える→答え)' },
  ];
  modes.forEach(m => {
    const chip = document.createElement('div');
    chip.className = 'status-chip' + (appMode === m.key ? ' active' : '');
    chip.textContent = m.label;
    chip.onclick = () => {
      stopSpeaking();
      isPlaying = false;
      playBtn.textContent = '▶';
      appMode = m.key;
      document.getElementById('jpToggleWrap').style.display = (appMode === 'listen') ? 'block' : 'none';
      document.getElementById('thinkTimeWrap').style.display = (appMode === 'quiz') ? 'block' : 'none';
      document.getElementById('reviewTimeWrap').style.display = (appMode === 'quiz') ? 'block' : 'none';
      buildModeFilters();
      applyFilter();
      renderStats();
      updateDisplay();
    };
    container.appendChild(chip);
  });
}

playBtn.onclick = () => {
  isPlaying = !isPlaying;
  playBtn.textContent = isPlaying ? '⏸' : '▶';
  if (isPlaying) {
    repeatCount = 0;
    if (appMode === 'quiz') updateDisplay(); // reset to hidden state
    speakCurrent();
  } else {
    stopSpeaking();
  }
};

nextBtn.onclick = () => { stopSpeaking(); goNext(); };
prevBtn.onclick = goPrev;

repeatSelect.onchange = () => { repeatTotal = parseInt(repeatSelect.value); };

function initApp() {
  buildFilters();
  buildStatusFilters();
  buildModeFilters();
  buildExcludeSpeakableToggle();
  renderStats();
  renderList();
  updateDisplay();
}

function startSession(user) {
  currentUser = user;
  localStorage.setItem(LOCAL_USER_KEY, user);
  document.getElementById('loginStatus').textContent = '読み込み中...';
  loadFromServer(user).then(() => {
    document.getElementById('loginOverlay').style.display = 'none';
    setSyncBadge(user + ' で同期中');
    initApp();
  }).catch(() => {
    document.getElementById('loginStatus').textContent = '通信に失敗しました。もう一度お試しください。';
  });
}

document.getElementById('loginBtn').onclick = () => {
  const val = document.getElementById('passInput').value.trim();
  if (!val) {
    document.getElementById('loginStatus').textContent = '合言葉を入力してください';
    return;
  }
  startSession(val);
};
document.getElementById('passInput').onkeydown = (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
};

document.getElementById('syncBadge').onclick = () => {
  if (currentUser) loadFromServer(currentUser).then(() => {
    setSyncBadge(currentUser + ' で同期中(更新済み)');
    initApp();
  });
};

// auto-login if a saved username exists on this device
const savedUser = localStorage.getItem(LOCAL_USER_KEY);
if (savedUser) {
  document.getElementById('passInput').value = savedUser;
  startSession(savedUser);
}
</script>
</body>
</html>
