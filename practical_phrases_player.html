
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>実用フレーズ 聞き流しプレイヤー1</title>
<style>
  :root {
    --bg: #14110f;
    --panel: #1c1815;
    --amber: #ff8c2e;
    --amber-dim: #c4691a;
    --text: #ede5d8;
    --text-dim: #968d7f;
    --line: #2e2822;
    --red: #d4453a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    min-height: 100vh;
    padding: 32px 16px;
  }
  .wrap { max-width: 640px; margin: 0 auto; }


  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
    text-decoration: none;
    border: 1px solid var(--line);
    border-radius: 99px;
    padding: 6px 14px;
    margin-bottom: 16px;
    transition: 0.15s;
  }
  .back-link:hover { border-color: var(--amber-dim); color: var(--amber); }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--amber-dim);
    text-transform: uppercase;
    font-weight: 700;
  }
  h1 {
    font-size: 26px;
    margin: 4px 0 24px;
    letter-spacing: -0.01em;
  }
  h1 span { color: var(--amber); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 16px;
  }

  .now-playing {
    text-align: center;
    padding: 28px 16px;
  }
  .cat-tag {
    display: inline-block;
    font-size: 13px;
    letter-spacing: 0.1em;
    color: var(--amber);
    border: 1px solid var(--amber-dim);
    border-radius: 99px;
    padding: 3px 10px;
    margin-bottom: 16px;
  }
  .phrase-en {
    font-size: 34px;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 10px;
    min-height: 76px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .phrase-jp {
    font-size: 18px;
    color: var(--text-dim);
  }

  .progress {
    height: 3px;
    background: var(--line);
    border-radius: 99px;
    overflow: hidden;
    margin: 20px 0 4px;
  }
  .progress-bar {
    height: 100%;
    background: var(--amber);
    width: 0%;
    transition: width 0.2s linear;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    margin-top: 20px;
  }
  .btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--text);
    border-radius: 99px;
    cursor: pointer;
    transition: 0.15s;
  }
  .btn:hover { border-color: var(--amber-dim); }
  .btn-skip { width: 44px; height: 44px; font-size: 16px; }
  .btn-play {
    width: 64px; height: 64px;
    font-size: 22px;
    background: var(--amber);
    border: none;
    color: #1a1208;
  }
  .btn-play:hover { background: #ffa14f; }

  .settings-row {
    display: flex;
    gap: 12px;
    margin-top: 18px;
  }
  .settings-row > div { flex: 1; }
  label {
    display: block;
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }
  select, input[type=range] {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px;
    font-size: 13px;
  }

  .cat-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 16px;
  }
  .cat-chip {
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 99px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
  }
  .cat-chip.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(255,140,46,0.08);
  }

  .list-title {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
    margin-bottom: 10px;
  }
  .phrase-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
  }
  .phrase-row:hover { background: var(--bg); }
  .phrase-row.current { background: rgba(255,140,46,0.1); }
  .phrase-row .en { font-weight: 600; }
  .phrase-row .jp { color: var(--text-dim); font-size: 14px; }
  .phrase-row .idx {
    color: var(--amber-dim);
    font-size: 11px;
    width: 24px;
    flex-shrink: 0;
  }
  .row-main { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .row-main .en, .row-main .jp { white-space: normal; }
  .row-main .idx { align-self: flex-start; }

  .status-buttons {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
    margin-left: 8px;
  }
  .status-btn {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: 0.15s;
  }
  .status-btn:hover { border-color: var(--amber-dim); }
  .status-btn.active-learning {
    background: rgba(196,105,26,0.25);
    border-color: var(--amber-dim);
    color: var(--amber);
  }
  .status-btn.active-known {
    background: rgba(255,140,46,0.3);
    border-color: var(--amber);
    color: var(--amber);
  }
  .status-btn.active-speakable {
    background: var(--amber);
    border-color: var(--amber);
    color: #1a1208;
  }

  .now-playing .status-buttons {
    justify-content: center;
    margin: 14px 0 0;
  }
  .now-playing .status-btn {
    width: 36px;
    height: 36px;
    font-size: 13px;
  }
  .status-label {
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
    margin-top: 4px;
  }

  .stats-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    font-size: 11px;
  }
  .stat-pill {
    flex: 1;
    text-align: center;
    padding: 8px 4px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--line);
  }
  .stat-pill .num { font-size: 16px; font-weight: 700; color: var(--amber); display: block; }
  .stat-pill .label { color: var(--text-dim); }

  .status-filter-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  .status-chip {
    font-size: 11px;
    padding: 5px 10px;
    border-radius: 99px;
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--text-dim);
    cursor: pointer;
  }
  .status-chip.active {
    border-color: var(--amber);
    color: var(--amber);
    background: rgba(255,140,46,0.08);
  }

  .hint {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-top: 4px;
  }

  .login-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 20px;
  }
  .login-box {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 28px 24px;
    max-width: 360px;
    width: 100%;
    text-align: center;
  }
  .login-box h2 { font-size: 18px; margin: 0 0 6px; }
  .login-box p { font-size: 12px; color: var(--text-dim); margin: 0 0 20px; }
  .login-box input {
    width: 100%;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px;
    font-size: 15px;
    margin-bottom: 12px;
    text-align: center;
  }
  .login-box button {
    width: 100%;
    background: var(--amber);
    border: none;
    color: #1a1208;
    font-weight: 700;
    border-radius: 8px;
    padding: 12px;
    font-size: 14px;
    cursor: pointer;
  }
  .login-status {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 10px;
    min-height: 14px;
  }
  .sync-badge {
    position: fixed;
    top: 10px;
    right: 10px;
    font-size: 10px;
    color: var(--text-dim);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 99px;
    padding: 4px 10px;
    z-index: 10;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <h2>合言葉を入力</h2>
    <p>PCとiPhoneで同じ合言葉を使うとデータが共有されます</p>
    <input type="text" id="passInput" placeholder="例: kouji2026" autocomplete="off">
    <button id="loginBtn">開始する</button>
    <div class="login-status" id="loginStatus"></div>
  </div>
</div>

<div class="sync-badge" id="syncBadge" style="display:none;"></div>

<div class="wrap">
  <a class="back-link" href="index.html">← トップに戻る</a>
  <div class="eyebrow">実用フレーズ / 会話特化版</div>
  <h1>実用<span>フレーズ</span></h1>

  <div class="panel" style="padding:14px 20px;">
    <div class="status-filter-row" id="modeFilters" style="margin-top:0;"></div>
  </div>

  <div class="panel now-playing">
    <div class="cat-tag" id="catTag">状況描写</div>
    <div class="phrase-jp" id="phraseJpQuiz" style="display:none; font-size:26px; font-weight:700; color:var(--text); margin-bottom:18px;"></div>
    <div class="phrase-en" id="phraseEn">Loading...</div>
    <div class="phrase-jp" id="phraseJp"></div>
    <div id="kwBox" style="display:none; margin-top:14px; background:rgba(255,140,46,0.08); border:1px solid var(--amber-dim); border-radius:8px; padding:12px 14px; text-align:left;">
      <div id="kwWord" style="font-size:15px; font-weight:700; color:var(--amber); margin-bottom:4px;"></div>
      <div id="kwEx" style="font-size:13px; color:var(--text-dim); line-height:1.6;"></div>
    </div>

    <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
    <div class="progress-label"><span id="curIdx">0</span><span id="totalIdx">0</span></div>

    <div class="controls">
      <button class="btn btn-skip" id="prevBtn">⏮</button>
      <button class="btn btn-play" id="playBtn">▶</button>
      <button class="btn btn-skip" id="nextBtn">⏭</button>
    </div>

    <div class="settings-row">
      <div>
        <label>速度</label>
        <select id="rateSelect">
          <option value="0.8" selected>遅め (0.8x)</option>
          <option value="1">標準 (1.0x)</option>
          <option value="1.2">やや速い (1.2x)</option>
        </select>
      </div>
      <div>
        <label>リピート回数</label>
        <select id="repeatSelect">
          <option value="1">1回</option>
          <option value="2">2回</option>
          <option value="3">3回</option>
          <option value="4">4回</option>
          <option value="5" selected>5回</option>
          <option value="6">6回</option>
          <option value="7">7回</option>
          <option value="8">8回</option>
          <option value="9">9回</option>
          <option value="10">10回</option>
        </select>
      </div>
      <div id="jpToggleWrap">
        <label>日本語も読む</label>
        <select id="jpToggle">
          <option value="no">英語のみ</option>
          <option value="yes" selected>英→日</option>
        </select>
      </div>
      <div id="thinkTimeWrap" style="display:none;">
        <label>考える時間</label>
        <select id="thinkTimeSelect">
          <option value="3000">3秒</option>
          <option value="5000" selected>5秒</option>
          <option value="8000">8秒</option>
          <option value="15000">15秒</option>
          <option value="20000">20秒</option>
        </select>
      </div>
      <div id="reviewTimeWrap" style="display:none;">
        <label>答え確認時間</label>
        <select id="reviewTimeSelect">
          <option value="3000">3秒</option>
          <option value="5000">5秒</option>
          <option value="8000" selected>8秒</option>
          <option value="10000">10秒</option>
          <option value="15000">15秒</option>
          <option value="20000">20秒</option>
        </select>
      </div>
    </div>

    <div class="hint" id="voiceHint"></div>

    <div class="status-buttons" id="nowPlayingStatus"></div>
    <div class="status-label">タップして習熟度を記録(端末に保存されます)</div>
  </div>

  <div class="panel">
    <div class="stats-row" id="statsRow"></div>
    <div class="status-filter-row" id="statusFilters"></div>
    <div class="status-filter-row" id="excludeSpeakableRow" style="margin-top:8px;"></div>
  </div>

  <div class="panel">
    <div class="cat-filters" id="catFilters"></div>
  </div>

  <div class="panel">
    <div class="list-title">フレーズ一覧（タップで再生）</div>
    <div id="listContainer"></div>
  </div>
</div>

<script>
const DATA = [
  {cat:"基本過去形", en:"I made it", jp:"自分はやり遂げた", kw:"made it", ex:"make it=やり遂げる・間に合う(成功のイディオム)"},
  {cat:"基本過去形", en:"I messed up", jp:"自分はやらかした(軽めの失敗)", kw:"messed up", ex:"mess up=失敗する・台無しにする"},
  {cat:"基本過去形", en:"I ran away", jp:"自分は逃げた", kw:"ran away", ex:"run away=逃げる(runの過去形がran)"},

  {cat:"基本過去形", en:"I lost track of it", jp:"自分はそれを見失った", kw:"lost track", ex:"lose track of=見失う・把握できなくなる"},
  {cat:"基本過去形", en:"I made the wrong choice", jp:"自分は間違った選択をした", kw:"wrong choice", ex:"wrong=間違った、choice=選択"},
  {cat:"基本過去形", en:"I took a wrong turn", jp:"自分は曲がる場所を間違えた", kw:"wrong turn", ex:"take a wrong turn=道を間違える"},
  {cat:"基本過去形", en:"I ran out of time", jp:"自分は時間が足りなかった", kw:"ran out of", ex:"run out of=〜がなくなる・尽きる"},
  {cat:"基本過去形", en:"I didn't see that coming", jp:"自分にはそれが来るとは思わなかった", kw:"see that coming", ex:"see something coming=予測する・予想する"},
  {cat:"基本過去形", en:"I almost made it", jp:"自分はもう少しだった", kw:"almost", ex:"almost=もう少しで・あやうく"},
  {cat:"基本過去形", en:"I screwed up", jp:"自分は完全に失敗した(重めの失敗)", kw:"screwed up", ex:"screw up=しくじる・台無しにする(mess upより強め)"},
  {cat:"基本過去形", en:"I dropped it", jp:"自分はそれを落とした", kw:"dropped", ex:"drop=落とす(dropの過去形がdropped)"},
  {cat:"基本過去形", en:"I changed my mind", jp:"自分は気が変わった", kw:"changed my mind", ex:"change one's mind=気が変わる"},
  {cat:"基本過去形", en:"I got confused", jp:"自分は混乱した", kw:"got confused", ex:"get confused=混乱する(confusedは形容詞)"},
  {cat:"基本過去形", en:"I got carried away", jp:"自分は調子に乗った", kw:"carried away", ex:"get carried away=調子に乗る・熱くなりすぎる"},
  {cat:"基本過去形", en:"I freaked out", jp:"自分は完全にパニックになった(取り乱した)", kw:"freaked out", ex:"freak out=パニックになる・取り乱す"},
  {cat:"基本過去形", en:"I lost it", jp:"自分は完全に冷静さを失った(freaked outより感情的)", kw:"lost it", ex:"lose it=冷静さを失う・キレる"},
  {cat:"基本過去形", en:"I wasted my time", jp:"自分は時間を無駄にした", kw:"wasted", ex:"waste=無駄にする"},

  {cat:"意思・必要", en:"I need to try again", jp:"自分はもう一回やらないと", kw:"try again", ex:"try again=やり直す"},
  {cat:"意思・必要", en:"I need to be more careful", jp:"自分はもっと気をつけないと", kw:"careful", ex:"careful=注意深い、be careful=気をつける"},
  {cat:"意思・必要", en:"I want to get out of here", jp:"自分はここから出たい", kw:"get out of", ex:"get out of=〜から出る・抜け出す"},

  {cat:"意思・必要", en:"I want to see what happens", jp:"自分はどうなるか見てみたい", kw:"what happens", ex:"what happens=何が起きるか"},
  {cat:"意思・必要", en:"I have to do something", jp:"自分は何かしなきゃ", kw:"have to", ex:"have to=〜しなければならない(mustより口語的)"},
  {cat:"意思・必要", en:"I have to be faster", jp:"自分はもっと速くしないと", kw:"faster", ex:"fast=速い、faster=より速い(比較級)"},
  {cat:"意思・必要", en:"I don't want to die", jp:"自分は死にたくない", kw:"don't want to", ex:"don't want to=〜したくない"},
  {cat:"意思・必要", en:"I'm going to try a different way", jp:"自分は別の方法でやってみる", kw:"different way", ex:"different=違う、way=方法"},
  {cat:"意思・必要", en:"I'm going to regret this", jp:"自分はこれを後悔しそう", kw:"regret", ex:"regret=後悔する"},
  {cat:"意思・必要", en:"I'm going to figure this out", jp:"自分はなんとかする", kw:"figure out", ex:"figure out=解決する・理解する"},

  {cat:"意思・必要", en:"I shouldn't have done that", jp:"自分はあれをすべきじゃなかった", kw:"shouldn't have", ex:"shouldn't have+過去分詞=〜すべきじゃなかった"},
  {cat:"意思・必要", en:"I should have known", jp:"自分には分かってたはずだった", kw:"should have known", ex:"should have known=分かってたはずだった"},
  {cat:"意思・必要", en:"I might be wrong", jp:"自分は間違ってるかも", kw:"might", ex:"might=〜かもしれない(mayより可能性が低め)"},
  {cat:"意思・必要", en:"I might as well try", jp:"どうせならやってみるか", kw:"might as well", ex:"might as well=〜してもいいか・どうせなら"},
  {cat:"意思・必要", en:"I could have done better", jp:"自分はもっとうまくできたのに", kw:"could have", ex:"could have+過去分詞=〜できたのに(後悔)"},
  {cat:"状況描写", en:"Things are getting complicated", jp:"ややこしくなってきた", kw:"complicated", ex:"complicated=複雑な・ややこしい"},
  {cat:"状況描写", en:"This is taking forever", jp:"全然終わらない", kw:"taking forever", ex:"take forever=永遠にかかる・全然終わらない"},
  {cat:"状況描写", en:"Something feels off", jp:"なんか変な感じがする", kw:"feels off", ex:"feel off=違和感がある・おかしい感じがする"},
  {cat:"状況描写", en:"This doesn't make sense", jp:"意味が分からない", kw:"make sense", ex:"make sense=意味をなす・理にかなう"},
  {cat:"状況描写", en:"It's getting worse", jp:"どんどん悪くなってる", kw:"getting worse", ex:"get worse=悪化する(worseはbadの比較級)"},
  {cat:"状況描写", en:"Everything is falling apart", jp:"全部崩れてきた", kw:"falling apart", ex:"fall apart=崩れる・バラバラになる"},
  {cat:"状況描写", en:"This is out of control", jp:"制御不能だ", kw:"out of control", ex:"out of control=制御不能・手に負えない"},

  {cat:"自己分析", en:"I got too comfortable", jp:"自分は油断しすぎた", kw:"comfortable", ex:"comfortable=快適な、get comfortable=油断する・慣れすぎる"},
  {cat:"自己分析", en:"I should have waited", jp:"自分は待てばよかった", kw:"should have waited", ex:"should have+過去分詞=〜すべきだった(後悔)"},
  {cat:"ネタ・キャラ", en:"I have no idea what that means", jp:"自分には全然意味が分からない", kw:"no idea", ex:"have no idea=全く分からない"},
  {cat:"ネタ・キャラ", en:"I think I understood that", jp:"自分はなんとなく理解できた気がする(聞いた後)", kw:"I think", ex:"I think=たぶん・〜だと思う"},
  {cat:"ネタ・キャラ", en:"Let me guess", jp:"自分が予測してみよう(答えを聞く前に当てる)", kw:"let me guess", ex:"let me guess=当ててみよう・たぶんこういうことでしょ"},
  {cat:"ネタ・キャラ", en:"I'll just say yes and hope for the best", jp:"とりあえずYESにして祈る", kw:"hope for the best", ex:"hope for the best=うまくいくことを祈る"},
  {cat:"ネタ・キャラ", en:"That probably means something important", jp:"あれはたぶん重要なことを言ってる", kw:"probably", ex:"probably=たぶん・おそらく"},
  {cat:"ネタ・キャラ", en:"I understood none of that", jp:"自分はそれが一言も分からなかった", kw:"none of that", ex:"none=何も〜ない、none of that=それの何も"},
  {cat:"ネタ・キャラ", en:"Close enough", jp:"だいたいあってる・まあいいか(正確さへの妥協)", kw:"close enough", ex:"close=近い、close enough=だいたいOK"},
  {cat:"ネタ・キャラ", en:"I'm going to pretend I understood that", jp:"自分は分かったふりをする", kw:"pretend", ex:"pretend=ふりをする"},
  {cat:"ネタ・キャラ", en:"That was definitely English", jp:"あれは確かに英語だった", kw:"definitely", ex:"definitely=確かに・間違いなく(皮肉として使う)"},
  {cat:"ネタ・キャラ", en:"My English is terrible and I know it", jp:"自分の英語は下手なのは分かってる", kw:"terrible", ex:"terrible=ひどい・最悪"},
];

// Total: 190 phrases

// Total: 190 phrases

let activeCats = new Set(DATA.map(d => d.cat));
let filtered = [...DATA];
let curIndex = 0;
let isPlaying = false;
let repeatCount = 1;
let repeatTotal = 5;
let synth = window.speechSynthesis;
let englishVoice = null;
let japaneseVoice = null;
let activeStatusFilter = 'all';
let excludeSpeakable = false;
let excludeKnown = false;
let appMode = 'listen'; // 'listen' or 'quiz'
let quizTimer = null;

const GAS_URL = 'https://script.google.com/macros/s/AKfycbyU-Nz-INLqD-OaBoETh9hDVWxILeNL4JsnMCeEQZrUpkl3eFc3D6vTBi2VtQcCG_BC/exec';
const APP_KEY = 'practical'; // distinguishes this app's data from the gta player
const LOCAL_USER_KEY = 'phraseAppUser_v1';

let currentUser = null;
let statusMap = { listen: {}, quiz: {} };
let saveTimer = null;

function loadStatusMap() {
  return statusMap;
}

function scheduleSave() {
  clearTimeout(saveTimer);
  setSyncBadge('保存中...');
  saveTimer = setTimeout(saveStatusMap, 600);
}

function saveStatusMap() {
  if (!currentUser) return;
  const payload = JSON.stringify(statusMap);
  const url = GAS_URL + '?action=save&user=' + encodeURIComponent(APP_KEY + ':' + currentUser) + '&data=' + encodeURIComponent(payload);
  fetch(url)
    .then(r => r.json())
    .then(() => setSyncBadge('保存済み'))
    .catch(() => setSyncBadge('保存失敗(通信を確認)'));
}

function loadFromServer(user) {
  const url = GAS_URL + '?action=load&user=' + encodeURIComponent(APP_KEY + ':' + user);
  return fetch(url)
    .then(r => r.json())
    .then(res => {
      try {
        const parsed = JSON.parse(res.data || '{}');
        // migrate old flat-format data (pre mode-split) into "listen" bucket
        if (parsed && (parsed.listen || parsed.quiz)) {
          statusMap = { listen: parsed.listen || {}, quiz: parsed.quiz || {} };
        } else {
          statusMap = { listen: parsed || {}, quiz: {} };
        }
      } catch (e) {
        statusMap = { listen: {}, quiz: {} };
      }
    });
}

function setSyncBadge(text) {
  const badge = document.getElementById('syncBadge');
  badge.style.display = 'block';
  badge.textContent = text;
}

const STATUS_DEFS = [
  { key: 'learning', icon: '!', label: '未習得' },
  { key: 'known', icon: '◯', label: '覚えた' },
  { key: 'speakable', icon: '★', label: '話せる' },
];

function currentBucket() {
  return statusMap[appMode];
}

function getStatus(item) {
  return currentBucket()[item.en] || 'none';
}

function setStatus(item, status) {
  const bucket = currentBucket();
  if (bucket[item.en] === status) {
    delete bucket[item.en];
  } else {
    bucket[item.en] = status;
  }
  scheduleSave();
  renderList();
  renderNowPlayingStatus();
  renderStats();
}

function buildStatusButtonsEl(item, large) {
  const wrap = document.createElement('div');
  wrap.className = 'status-buttons';
  STATUS_DEFS.forEach(def => {
    const btn = document.createElement('button');
    btn.className = 'status-btn';
    btn.textContent = def.icon;
    btn.title = def.label;
    if (getStatus(item) === def.key) btn.classList.add('active-' + def.key);
    btn.onclick = (e) => {
      e.stopPropagation();
      setStatus(item, def.key);
    };
    wrap.appendChild(btn);
  });
  return wrap;
}

function renderNowPlayingStatus() {
  const el = document.getElementById('nowPlayingStatus');
  el.innerHTML = '';
  if (filtered.length === 0) return;
  el.appendChild(buildStatusButtonsEl(filtered[curIndex], true));
}

function renderStats() {
  const counts = { none: 0, learning: 0, known: 0, speakable: 0 };
  DATA.forEach(d => {
    const s = getStatus(d);
    counts[s] = (counts[s] || 0) + 1;
  });
  const statsRow = document.getElementById('statsRow');
  statsRow.innerHTML = `
    <div class="stat-pill"><span class="num">${counts.speakable}</span><span class="label">話せる</span></div>
    <div class="stat-pill"><span class="num">${counts.known}</span><span class="label">覚えた</span></div>
    <div class="stat-pill"><span class="num">${counts.learning}</span><span class="label">未習得</span></div>
    <div class="stat-pill"><span class="num">${counts.none}</span><span class="label">未チェック</span></div>
  `;
}

function buildStatusFilters() {
  const container = document.getElementById('statusFilters');
  container.innerHTML = '';
  const allDefs = [
    { key: 'all', label: 'すべて' },
    { key: 'speakable', label: '★話せる' },
    { key: 'known', label: '◯覚えた' },
    { key: 'learning', label: '!未習得' },
    { key: 'none', label: '未チェック' },
  ];
  allDefs.forEach(def => {
    const chip = document.createElement('div');
    chip.className = 'status-chip' + (activeStatusFilter === def.key ? ' active' : '');
    chip.textContent = def.label;
    chip.onclick = () => {
      activeStatusFilter = def.key;
      applyFilter();
      buildStatusFilters();
    };
    container.appendChild(chip);
  });
}


const phraseEn = document.getElementById('phraseEn');
const phraseJp = document.getElementById('phraseJp');
const catTag = document.getElementById('catTag');
const progressBar = document.getElementById('progressBar');
const curIdxEl = document.getElementById('curIdx');
const totalIdxEl = document.getElementById('totalIdx');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const rateSelect = document.getElementById('rateSelect');
const repeatSelect = document.getElementById('repeatSelect');
const jpToggle = document.getElementById('jpToggle');
const catFilters = document.getElementById('catFilters');
const listContainer = document.getElementById('listContainer');
const voiceHint = document.getElementById('voiceHint');

function loadVoices() {
  const voices = synth.getVoices();
  englishVoice = voices.find(v => v.lang.startsWith('en')) || null;
  japaneseVoice = voices.find(v => v.lang.startsWith('ja')) || null;
  if (!englishVoice) {
    voiceHint.textContent = '英語音声が見つかりません。ブラウザ設定で英語の音声をインストールしてください。';
  } else {
    voiceHint.textContent = '';
  }
}
if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = loadVoices;
loadVoices();

function buildFilters() {
  const cats = [...new Set(DATA.map(d => d.cat))];
  catFilters.innerHTML = '';
  cats.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'cat-chip active';
    chip.textContent = cat;
    chip.onclick = () => {
      if (activeCats.has(cat)) {
        if (activeCats.size === 1) return;
        activeCats.delete(cat);
        chip.classList.remove('active');
      } else {
        activeCats.add(cat);
        chip.classList.add('active');
      }
      applyFilter();
    };
    catFilters.appendChild(chip);
  });
}

function applyFilter() {
  filtered = DATA.filter(d => {
    if (!activeCats.has(d.cat)) return false;
    if (activeStatusFilter !== 'all' && getStatus(d) !== activeStatusFilter) return false;
    if (excludeSpeakable && getStatus(d) === 'speakable') return false;
    if (excludeKnown && getStatus(d) === 'known') return false;
    return true;
  });
  curIndex = 0;
  renderList();
  updateDisplay();
}

function buildExcludeSpeakableToggle() {
  const container = document.getElementById('excludeSpeakableRow');
  container.innerHTML = '';

  const chip1 = document.createElement('div');
  chip1.className = 'status-chip' + (excludeSpeakable ? ' active' : '');
  chip1.textContent = excludeSpeakable ? '★話せるは流さない (ON)' : '★話せるも流す (OFF)';
  chip1.onclick = () => {
    excludeSpeakable = !excludeSpeakable;
    buildExcludeSpeakableToggle();
    applyFilter();
  };
  container.appendChild(chip1);

  const chip2 = document.createElement('div');
  chip2.className = 'status-chip' + (excludeKnown ? ' active' : '');
  chip2.textContent = excludeKnown ? '◯覚えたは流さない (ON)' : '◯覚えたも流す (OFF)';
  chip2.onclick = () => {
    excludeKnown = !excludeKnown;
    buildExcludeSpeakableToggle();
    applyFilter();
  };
  container.appendChild(chip2);
}

function renderList() {
  listContainer.innerHTML = '';
  filtered.forEach((item, i) => {
    const row = document.createElement('div');
    row.className = 'phrase-row' + (i === curIndex ? ' current' : '');
    const mainDiv = document.createElement('div');
    mainDiv.className = 'row-main';
    mainDiv.innerHTML = `
      <span class="idx">${i + 1}</span>
      <span class="en">${item.en}</span>
      <span class="jp">${item.jp}</span>
    `;
    mainDiv.onclick = () => {
      stopSpeaking();
      curIndex = i;
      updateDisplay();
      if (isPlaying) speakCurrent();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    };
    row.appendChild(mainDiv);
    row.appendChild(buildStatusButtonsEl(item, false));
    listContainer.appendChild(row);
  });
}

function updateDisplay() {
  if (filtered.length === 0) return;
  const item = filtered[curIndex];
  catTag.textContent = item.cat;
  curIdxEl.textContent = (curIndex + 1) + ' / ' + filtered.length;
  totalIdxEl.textContent = '';
  progressBar.style.width = ((curIndex) / Math.max(filtered.length - 1, 1)) * 100 + '%';

  const phraseJpQuiz = document.getElementById('phraseJpQuiz');

  if (appMode === 'quiz') {
    // show Japanese first, hide English, then reveal after thinking time
    phraseJpQuiz.style.display = 'block';
    phraseJpQuiz.textContent = item.jp;
    phraseEn.textContent = '？？？';
    phraseEn.style.opacity = '0.3';
    phraseJp.textContent = '';
  } else {
    phraseJpQuiz.style.display = 'none';
    phraseEn.textContent = item.en;
    phraseEn.style.opacity = '1';
    phraseJp.textContent = item.jp;
    if (item.kw) {
      document.getElementById('kwWord').textContent = item.kw;
      document.getElementById('kwEx').textContent = item.ex || '';
      document.getElementById('kwBox').style.display = 'block';
    } else {
      document.getElementById('kwBox').style.display = 'none';
    }
  }

  document.querySelectorAll('.phrase-row').forEach((r, i) => {
    r.classList.toggle('current', i === curIndex);
  });
  renderNowPlayingStatus();
}

function revealAnswer() {
  if (filtered.length === 0) return;
  const item = filtered[curIndex];
  phraseEn.textContent = item.en;
  phraseEn.style.opacity = '1';
  // show keyword box
  if (item.kw) {
    document.getElementById('kwWord').textContent = item.kw;
    document.getElementById('kwEx').textContent = item.ex || '';
    document.getElementById('kwBox').style.display = 'block';
  }
}

function speakCurrent() {
  if (filtered.length === 0) return;
  const item = filtered[curIndex];
  const rate = parseFloat(rateSelect.value);
  const wantJp = jpToggle.value === 'yes';

  if (appMode === 'quiz') {
    // speak Japanese first, then wait remaining thinking time, then reveal + speak English
    const thinkMs = parseInt(document.getElementById('thinkTimeSelect').value);
    clearTimeout(quizTimer);

    if (japaneseVoice) {
      const uttJpFirst = new SpeechSynthesisUtterance(item.jp);
      uttJpFirst.lang = 'ja-JP';
      uttJpFirst.voice = japaneseVoice;
      uttJpFirst.rate = 1;
      uttJpFirst.onend = () => {
        quizTimer = setTimeout(() => {
          if (!isPlaying) return;
          revealAnswer();
          speakEnglishThenAdvance(item, rate);
        }, thinkMs);
      };

      synth.cancel();
      synth.speak(uttJpFirst);
    } else {
      quizTimer = setTimeout(() => {
        if (!isPlaying) return;
        revealAnswer();
        speakEnglishThenAdvance(item, rate);
      }, thinkMs);
    }
    return;
  }

  speakEnglishThenAdvance(item, rate, wantJp);
}

function speakEnglishThenAdvance(item, rate, wantJp) {
  const uttEn = new SpeechSynthesisUtterance(item.en);
  uttEn.lang = 'en-US';
  uttEn.rate = rate;
  if (englishVoice) uttEn.voice = englishVoice;

  uttEn.onend = () => {
    repeatCount++;
    if (repeatCount < repeatTotal) {
      if (isPlaying) speakEnglishThenAdvance(item, rate, wantJp);
      return;
    }
    repeatCount = 0;
    const reviewMs = (appMode === 'quiz') ? parseInt(document.getElementById('reviewTimeSelect').value) : 0;
    const proceed = () => {
      if (!isPlaying) return;
      if (wantJp && japaneseVoice) {
        const uttJp = new SpeechSynthesisUtterance(item.jp);
        uttJp.lang = 'ja-JP';
        uttJp.voice = japaneseVoice;
        uttJp.rate = 1;
        uttJp.onend = () => { if (isPlaying) goNext(true); };
        synth.speak(uttJp);
      } else {
        goNext(true);
      }
    };
    if (reviewMs > 0) {
      clearTimeout(quizTimer);
      quizTimer = setTimeout(proceed, reviewMs);
    } else {
      proceed();
    }
  };

  synth.cancel();
  synth.speak(uttEn);
}

function goNext(auto) {
  curIndex = (curIndex + 1) % filtered.length;
  updateDisplay();
  if (isPlaying) speakCurrent();
}

function goPrev() {
  stopSpeaking();
  curIndex = (curIndex - 1 + filtered.length) % filtered.length;
  updateDisplay();
  if (isPlaying) speakCurrent();
}

function stopSpeaking() {
  synth.cancel();
  clearTimeout(quizTimer);
  repeatCount = 0;
}

function buildModeFilters() {
  const container = document.getElementById('modeFilters');
  container.innerHTML = '';
  const modes = [
    { key: 'listen', label: '聞き流しモード' },
    { key: 'quiz', label: 'クイズモード(日本語→考える→答え)' },
  ];
  modes.forEach(m => {
    const chip = document.createElement('div');
    chip.className = 'status-chip' + (appMode === m.key ? ' active' : '');
    chip.textContent = m.label;
    chip.onclick = () => {
      stopSpeaking();
      isPlaying = false;
      playBtn.textContent = '▶';
      appMode = m.key;
      document.getElementById('jpToggleWrap').style.display = (appMode === 'listen') ? 'block' : 'none';
      document.getElementById('thinkTimeWrap').style.display = (appMode === 'quiz') ? 'block' : 'none';
      document.getElementById('reviewTimeWrap').style.display = (appMode === 'quiz') ? 'block' : 'none';
      buildModeFilters();
      applyFilter();
      renderStats();
      updateDisplay();
    };
    container.appendChild(chip);
  });
}

playBtn.onclick = () => {
  isPlaying = !isPlaying;
  playBtn.textContent = isPlaying ? '⏸' : '▶';
  if (isPlaying) {
    repeatCount = 0;
    if (appMode === 'quiz') updateDisplay(); // reset to hidden state
    speakCurrent();
  } else {
    stopSpeaking();
  }
};

nextBtn.onclick = () => { stopSpeaking(); goNext(); };
prevBtn.onclick = goPrev;

repeatSelect.onchange = () => { repeatTotal = parseInt(repeatSelect.value); };

function initApp() {
  buildFilters();
  buildStatusFilters();
  buildModeFilters();
  buildExcludeSpeakableToggle();
  renderStats();
  renderList();
  updateDisplay();
}

function startSession(user) {
  currentUser = user;
  localStorage.setItem(LOCAL_USER_KEY, user);
  document.getElementById('loginStatus').textContent = '読み込み中...';
  loadFromServer(user).then(() => {
    document.getElementById('loginOverlay').style.display = 'none';
    setSyncBadge(user + ' で同期中');
    initApp();
  }).catch(() => {
    document.getElementById('loginStatus').textContent = '通信に失敗しました。もう一度お試しください。';
  });
}

document.getElementById('loginBtn').onclick = () => {
  const val = document.getElementById('passInput').value.trim();
  if (!val) {
    document.getElementById('loginStatus').textContent = '合言葉を入力してください';
    return;
  }
  startSession(val);
};
document.getElementById('passInput').onkeydown = (e) => {
  if (e.key === 'Enter') document.getElementById('loginBtn').click();
};

document.getElementById('syncBadge').onclick = () => {
  if (currentUser) loadFromServer(currentUser).then(() => {
    setSyncBadge(currentUser + ' で同期中(更新済み)');
    initApp();
  });
};

// auto-login if a saved username exists on this device
const savedUser = localStorage.getItem(LOCAL_USER_KEY);
if (savedUser) {
  document.getElementById('passInput').value = savedUser;
  startSession(savedUser);
}
</script>
